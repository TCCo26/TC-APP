<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qualitech Philippines — Morning Dashboard</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#1B3A6B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="QP Dashboard">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<style>
:root {
  --bg: #F0F2F5;
  --surface: #FFFFFF;
  --navy: #1B3A6B;
  --navy-light: #2A5298;
  --teal: #1B6B5A;
  --border: #E2E5EA;
  --border-strong: #C8CDD6;
  --muted: #6B7380;
  --text: #1A1D23;
  --text-2: #4A5060;
  /* Priority colors: p1 Overdue (red), p2 Urgent (yellow),
     p3 Complete Today (purple), p4 Not Urgent (white) */
  --p1-color: #C0392B;
  --p1-bg: #FDF0EF;
  --p1-border: #E74C3C;
  --p2-color: #8A6D00;
  --p2-bg: #FFF6D6;
  --p2-border: #F0C419;
  --p3-color: #7D3C98;
  --p3-bg: #F5EEF8;
  --p3-border: #C39BD3;
  --p4-color: #4A5568;
  --p4-bg: #FFFFFF;
  --p4-border: #CBD5E0;
  --done-color: #718096;
  --green: #1A7A4A;
  --green-bg: #EEF8F3;
  --rail-w: 230px;
  --top-h: 112px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── TOP BAR ── */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--top-h);
  background: var(--navy);
  z-index: 100;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 24px;
  gap: 10px;
}

.topbar-row1 {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-mark {
  width: 32px; height: 32px;
  background: rgba(255,255,255,0.15);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff;
  letter-spacing: -0.5px;
}

.brand-name {
  font-size: 13px;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
  letter-spacing: 0.02em;
}

.brand-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  margin-left: 2px;
}

.topbar-date {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  font-variant-numeric: tabular-nums;
}

.kpi-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.kpi {
  background: rgba(255,255,255,0.08);
  border-radius: 7px;
  padding: 7px 12px;
  border: 1px solid rgba(255,255,255,0.08);
  text-align: left;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
}

.kpi:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.18); }

.kpi-label {
  font-size: 10px;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 2px;
}

.kpi-val {
  font-size: 18px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: #fff;
}

.kpi-val.danger { color: #FF8080; }
.kpi-val.warn   { color: #FFD080; }
.kpi-val.ok     { color: #80FFBC; }

/* ── LAYOUT SHELL ── */
.shell {
  display: flex;
  padding-top: var(--top-h);
  min-height: 100vh;
}

/* ── LEFT RAIL ── */
.rail {
  width: var(--rail-w);
  position: fixed;
  top: var(--top-h);
  bottom: 0;
  left: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.rail-section-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  padding: 16px 16px 6px;
}

.desk-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px;
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  border-radius: 0;
  transition: background 0.1s;
  position: relative;
}

.desk-btn:hover { background: #F4F6F9; }

.desk-btn.active {
  background: #EEF3FB;
}

.desk-btn.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--navy);
  border-radius: 0 2px 2px 0;
}

.desk-icon {
  width: 28px; height: 28px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
}

.desk-info { flex: 1; min-width: 0; }

.desk-num {
  font-size: 10px;
  color: var(--muted);
  font-weight: 600;
}

.desk-name-text {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.desk-btn.active .desk-name-text { color: var(--navy); }

.desk-count {
  font-size: 10px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  min-width: 18px;
  height: 18px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  padding: 0 4px;
}

.desk-count.has-p1 { background: var(--p1-bg); color: var(--p1-color); }
.desk-count.has-p2 { background: var(--p2-bg); color: var(--p2-color); }
.desk-count.none   { background: var(--green-bg); color: var(--green); }
.desk-count.empty  { background: var(--bg); color: var(--muted); }

.rail-footer {
  margin-top: auto;
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--muted);
  line-height: 1.6;
}

/* ── MAIN CONTENT ── */
.main {
  margin-left: var(--rail-w);
  flex: 1;
  padding: 24px;
  min-width: 0;
}

.desk-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 18px;
  gap: 12px;
  flex-wrap: wrap;
}

.desk-title-area { flex: 1; }

.desk-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 2px;
}

.desk-desc {
  font-size: 12px;
  color: var(--muted);
}

.desk-actions {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
}

.btn {
  font-size: 12px;
  font-weight: 500;
  padding: 7px 14px;
  border-radius: 7px;
  border: 1px solid var(--border-strong);
  background: var(--surface);
  color: var(--text-2);
  cursor: pointer;
  transition: background 0.1s, border-color 0.1s;
  white-space: nowrap;
}

.btn:hover { background: var(--bg); border-color: var(--border-strong); }

.btn-primary {
  background: var(--navy);
  color: #fff;
  border-color: var(--navy);
}

.btn-primary:hover { background: var(--navy-light); border-color: var(--navy-light); }
.btn:disabled { opacity: 0.45; cursor: default; pointer-events: none; }

.btn-danger {
  color: var(--p1-color);
  border-color: var(--p1-border);
}

.btn-danger:hover { background: var(--p1-bg); }

/* ── TASK CARDS ── */
.tasks-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.task-card {
  background: var(--surface);
  border-radius: 10px;
  border: 1px solid var(--border);
  overflow: hidden;
  transition: box-shadow 0.15s;
}

.task-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

.task-card.done {
  opacity: 0.55;
}

.task-card.p1 { border-left: 4px solid var(--p1-border); }
.task-card.p2 { border-left: 4px solid var(--p2-border); }
.task-card.p3 { border-left: 4px solid var(--p3-border); }
.task-card.p4 { border-left: 4px solid var(--p4-border); }

@keyframes heatpulse {
  0%   { border-left-color: var(--p1-border); }
  50%  { border-left-color: #FF6B6B; }
  100% { border-left-color: var(--p1-border); }
}

.task-card.p1 { animation: heatpulse 2s ease-in-out 1; }

.task-main {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
}

.task-check {
  width: 18px; height: 18px;
  border-radius: 5px;
  border: 1.5px solid var(--border-strong);
  cursor: pointer;
  flex-shrink: 0;
  margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  background: var(--surface);
}

.task-check:hover { border-color: var(--teal); }
.task-check.checked { background: var(--teal); border-color: var(--teal); }

.task-check.checked::after {
  content: '';
  width: 10px; height: 6px;
  border-left: 2px solid #fff;
  border-bottom: 2px solid #fff;
  transform: rotate(-45deg) translateY(-1px);
}

.task-body { flex: 1; min-width: 0; }

.task-title-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 3px;
}

.task-title-input {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  border: none;
  background: transparent;
  outline: none;
  width: 100%;
  font-family: inherit;
  line-height: 1.4;
  resize: none;
  padding: 0;
}

.task-title-input:focus {
  color: var(--navy);
}

.task-card.done .task-title-input {
  text-decoration: line-through;
  color: var(--done-color);
}

.task-meta-input {
  font-size: 11px;
  color: var(--muted);
  border: none;
  background: transparent;
  outline: none;
  width: 100%;
  font-family: inherit;
  line-height: 1.5;
  resize: none;
  padding: 0;
}

.task-meta-input:focus { color: var(--text-2); }

.task-meta-input::placeholder { color: var(--border-strong); }

.task-controls {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  flex-wrap: wrap;
  justify-content: flex-end;
  max-width: 260px;
}

.priority-btn {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 5px;
  cursor: pointer;
  border: none;
  white-space: nowrap;
  letter-spacing: 0.03em;
  transition: opacity 0.1s;
}

.priority-btn:hover { opacity: 0.8; }

.priority-select {
  font-family: inherit;
  outline: none;
  appearance: auto;
}

.priority-btn.p1 { background: var(--p1-bg); color: var(--p1-color); border: 1px solid #F5C6C4; }
.priority-btn.p2 { background: var(--p2-bg); color: var(--p2-color); border: 1px solid #F5DFA0; }
.priority-btn.p3 { background: var(--p3-bg); color: var(--p3-color); border: 1px solid #B8D4EF; }
.priority-btn.p4 { background: var(--p4-bg); color: var(--p4-color); border: 1px solid var(--border-strong); }

/* ── STATUS BAR ── */
.status-btn {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 5px;
  cursor: pointer;
  border: none;
  white-space: nowrap;
  letter-spacing: 0.03em;
  transition: opacity 0.1s;
}
.status-btn:hover { opacity: 0.8; }
/* Independent of the priority colors below — status is a different axis
   (workflow stage) from priority (urgency), so it shouldn't shift when
   priority colors change. */
.status-btn.not-started { background: #F7F8FA; color: #4A5568; border: 1px solid var(--border-strong); }
.status-btn.in-progress { background: #EEF4FB; color: #1A5A9A; border: 1px solid #B8D4EF; }
.status-btn.blocked     { background: #FDF0EF; color: #C0392B; border: 1px solid #F5C6C4; }
.status-btn.done        { background: var(--green-bg); color: var(--green); border: 1px solid #BFE3D0; }

.kind-select {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 5px;
  cursor: pointer;
  font-family: inherit;
  outline: none;
  appearance: auto;
}
.kind-select.kind-task    { background: #EEF4FB; color: #1A5A9A; border: 1px solid #B8D4EF; }
.kind-select.kind-payment { background: #FDF3E7; color: #9A5B12; border: 1px solid #F0D9AE; }

/* ── DATE COLUMN ── */
.date-input {
  font-size: 11px;
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 3px 6px;
  color: var(--text-2);
  background: var(--bg);
  outline: none;
  font-family: inherit;
  max-width: 128px;
}

.delete-btn {
  width: 24px; height: 24px;
  border-radius: 5px;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.1s, background 0.1s;
}

.task-card:hover .delete-btn { opacity: 1; }
.delete-btn:hover { background: var(--p1-bg); color: var(--p1-color); }

/* ── NOTES AREA ── */
.task-notes-area {
  border-top: 1px solid var(--border);
  padding: 8px 14px 10px 44px;
  display: none;
}

.task-notes-area.open { display: block; }

.task-notes {
  font-size: 12px;
  color: var(--text-2);
  border: none;
  background: transparent;
  outline: none;
  width: 100%;
  font-family: inherit;
  line-height: 1.6;
  resize: none;
  min-height: 40px;
}

.task-notes::placeholder { color: var(--border-strong); font-style: italic; }
.task-notes:focus { color: var(--text); }

/* ── NOTES TOGGLE ── */
.task-toggle-row {
  display: flex;
  gap: 12px;
  margin-top: 2px;
}

.notes-toggle {
  font-size: 10px;
  color: var(--muted);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  display: flex; align-items: center; gap: 3px;
  transition: color 0.1s;
}

.notes-toggle:hover { color: var(--navy); }

/* ── TASK LINK ── */
.task-link-icon { color: var(--navy-light); }
.task-link-icon:hover { color: var(--navy); text-decoration: underline; }

.task-link-area {
  border-top: 1px solid var(--border);
  padding: 8px 14px 10px 44px;
  display: none;
}

.task-link-area.open { display: block; }

.task-link-input {
  font-size: 12px;
  color: var(--text-2);
  border: 1px solid var(--border);
  background: var(--bg);
  outline: none;
  width: 100%;
  font-family: inherit;
  padding: 6px 10px;
  border-radius: 6px;
}

.task-link-input:focus { color: var(--text); border-color: var(--border-strong); }

/* ── ADD TASK AREA ── */
.add-task-area {
  margin-bottom: 14px;
  padding: 12px 14px;
  background: var(--surface);
  border: 1px dashed var(--border-strong);
  border-radius: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: text;
  transition: border-color 0.15s;
  flex-wrap: wrap;
}

.add-task-area:hover, .add-task-area:focus-within {
  border-color: var(--navy);
  border-style: solid;
}

.add-icon {
  width: 18px; height: 18px;
  border-radius: 5px;
  background: var(--bg);
  border: 1.5px solid var(--border-strong);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  color: var(--muted);
  flex-shrink: 0;
}

.add-input {
  flex: 1;
  min-width: 140px;
  border: none;
  background: transparent;
  outline: none;
  font-family: inherit;
  font-size: 13px;
  color: var(--text);
}

.add-input::placeholder { color: var(--border-strong); }

.add-priority-select {
  font-size: 11px;
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 3px 6px;
  color: var(--text-2);
  background: var(--bg);
  cursor: pointer;
  outline: none;
}

/* ── SECTION DIVIDERS ── */
.section-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 18px 0 8px;
}

.section-divider-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  white-space: nowrap;
  color: var(--muted);
}

.section-divider-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--muted);
}

.empty-icon {
  font-size: 32px;
  margin-bottom: 12px;
  opacity: 0.4;
}

.empty-text {
  font-size: 13px;
  color: var(--muted);
}

/* ── NOTES (DAILY LOG) ── */
.notes-layout {
  display: flex;
  gap: 20px;
  align-items: flex-start;
}
.notes-editor {
  flex: 1;
  min-width: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  --p-space: 10px;
}
.notes-editor-inner {
  padding: 20px 20px 0;
}
.notes-editor-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 4px;
  flex-wrap: wrap;
  gap: 6px;
}
.notes-editor-date {
  font-size: 16px;
  font-weight: 700;
  color: var(--navy);
}
.notes-editor-dow {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
}
.notes-editor-head-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.notes-saved {
  font-size: 11px;
  color: var(--green);
  display: flex;
  align-items: center;
  gap: 4px;
}
.notes-title-input {
  display: block;
  width: 100%;
  border: none;
  outline: none;
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  padding: 6px 0 8px;
  margin-top: 2px;
  border-bottom: 1px solid var(--border);
  background: transparent;
}
.notes-title-input::placeholder { color: var(--border-strong); font-weight: 500; }
.notes-tag-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 10px;
}
.notes-tag-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-right: 2px;
}
.notes-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px 4px 8px;
  border-radius: 12px;
  cursor: pointer;
  border: 1px solid transparent;
  background: var(--bg);
  color: var(--muted);
}
.notes-tag .tag-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: var(--border-strong); }
.notes-tag.selected { background: var(--tag-bg); color: var(--tag-color); border-color: var(--tag-color); }
.notes-tag.selected .tag-dot { background: var(--tag-color); }
.notes-tag:not(.selected):hover { background: #E9EBEF; }
.notes-toolbar {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 4px;
  padding: 8px 12px;
  background: #F7F8FA;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin-top: 14px;
}
.notes-toolbar select {
  font-size: 12px;
  font-family: inherit;
  color: var(--text-2);
  border: 1px solid var(--border-strong);
  border-radius: 6px;
  padding: 5px 6px;
  background: var(--surface);
  cursor: pointer;
  outline: none;
}
.tb-btn {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid transparent;
  border-radius: 6px;
  background: none;
  color: var(--text-2);
  font-size: 13px;
  cursor: pointer;
}
.tb-btn:hover { background: #E9EBEF; }
.tb-btn.active { background: #DCE6F5; border-color: #B8CBE8; color: var(--navy); }
.tb-sep { width: 1px; height: 20px; background: var(--border-strong); margin: 0 4px; }
.tb-color-swatch {
  width: 20px; height: 20px; border-radius: 4px; cursor: pointer; border: 1px solid var(--border-strong); padding: 0;
}
.notes-editable {
  min-height: 300px;
  outline: none;
  font-size: 13.5px;
  line-height: 1.7;
  color: var(--text);
  padding: 14px 20px 20px;
}
.notes-editable p, .notes-editable div { margin-bottom: var(--p-space); }
.notes-editable ul, .notes-editable ol { padding-left: 22px; margin-bottom: var(--p-space); }
.notes-editable:empty::before {
  content: attr(data-placeholder);
  color: var(--border-strong);
}

.notes-outline {
  width: 230px;
  flex-shrink: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.notes-outline-head {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.notes-outline-search {
  display: block;
  width: calc(100% - 20px);
  margin: 10px 10px 4px;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 12px;
  color: var(--text);
  background: var(--bg);
  outline: none;
  font-family: inherit;
}
.notes-outline-filter {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin: 8px 10px 2px;
}
.notes-outline-filter .notes-tag { padding: 3px 8px 3px 7px; font-size: 10.5px; }
.notes-outline-month {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 10px 14px 4px;
}
.notes-outline-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 14px;
  cursor: pointer;
  position: relative;
  font-size: 12.5px;
  color: var(--text-2);
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}
.notes-outline-item:hover { background: #F4F6F9; }
.notes-outline-item.active {
  background: #EEF3FB;
  color: var(--navy);
  font-weight: 600;
}
.notes-outline-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--navy);
}
.notes-outline-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--border-strong);
  flex-shrink: 0;
}
.notes-outline-item.active .notes-outline-dot { background: var(--navy); }
.notes-outline-snippet {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  min-width: 0;
}
.notes-outline-tags {
  display: flex;
  gap: 3px;
  flex-shrink: 0;
}
.notes-outline-tags .tag-dot { width: 6px; height: 6px; border-radius: 50%; }
.notes-outline-empty {
  padding: 16px 14px;
  font-size: 11px;
  color: var(--muted);
  text-align: center;
}

/* ── OVERVIEW ── */
.ov-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
  margin-bottom: 8px;
}
.ov-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  cursor: pointer;
  transition: box-shadow 0.15s, border-color 0.15s;
}
.ov-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-color: var(--border-strong); }
.ov-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.ov-card-title { font-size: 13px; font-weight: 600; color: var(--text); }
.ov-card-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
.ov-card-counts { display: flex; gap: 6px; flex-wrap: wrap; }
.ov-pill { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 99px; }
.ov-pill.p1 { background: var(--p1-bg); color: var(--p1-color); }
.ov-pill.p2 { background: var(--p2-bg); color: var(--p2-color); }
.ov-pill.ok { background: var(--green-bg); color: var(--green); }

/* ── MORNING CHECKLIST ── */
.checklist-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 16px;
}
.checklist-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px 8px;
}
.checklist-title { font-size: 13px; font-weight: 700; color: var(--text); }
.checklist-track {
  height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden;
  margin: 0 14px 8px;
}
.checklist-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.2s ease; }
.checklist-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px; border-radius: 8px; cursor: pointer;
}
.checklist-item:hover { background: var(--bg); }
.checklist-item.checked .checklist-label { text-decoration: line-through; color: var(--done-color); }
.checklist-label { flex: 1; font-size: 13px; font-weight: 500; min-width: 0; }
.checklist-sub { font-size: 11px; color: var(--muted); white-space: nowrap; }

/* ── PRODUCTIVITY SNAPSHOT (Overview charts) ── */
.prod-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 8px;
}
.prod-card-wide { grid-column: 1 / -1; }
.prod-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}
.prod-card-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
.prod-card-sub { font-size: 11px; color: var(--muted); margin-top: 8px; }
.prod-meter-row { display: flex; align-items: center; gap: 10px; }
.prod-meter-track { flex: 1; height: 10px; background: var(--bg); border-radius: 5px; overflow: hidden; }
.prod-meter-fill { height: 100%; background: var(--green); border-radius: 5px; }
.prod-meter-value {
  font-size: 18px; font-weight: 700; color: var(--text);
  font-variant-numeric: tabular-nums; min-width: 46px; text-align: right;
}
.prod-stack { display: flex; height: 20px; border-radius: 5px; overflow: hidden; background: var(--bg); }
.prod-legend { display: flex; flex-wrap: wrap; gap: 8px 16px; margin-top: 10px; }
.prod-legend-item { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-2); }
.prod-legend-swatch { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
.prod-bars { display: flex; flex-direction: column; gap: 8px; }
.prod-bar-row { display: flex; align-items: center; gap: 8px; }
.prod-bar-label {
  width: 150px; font-size: 11px; color: var(--text-2); flex-shrink: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.prod-bar-track { flex: 1; background: var(--bg); border-radius: 4px; height: 16px; }
.prod-bar-fill { height: 100%; background: var(--navy-light); border-radius: 4px; }
.prod-bar-value { width: 22px; font-size: 11px; color: var(--text-2); text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; }

@media (max-width: 860px) {
  .prod-grid { grid-template-columns: 1fr; }
  .prod-bar-label { width: 110px; }
  .checklist-item { flex-wrap: wrap; }
  .checklist-sub { width: 100%; margin-left: 44px; }
}

/* ── CALENDAR ── */
.cal-dow {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  margin-top: 16px;
  margin-bottom: 4px;
}
.cal-dow div {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--muted); text-align: center;
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}
.cal-cell {
  aspect-ratio: 1;
  min-height: 72px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  overflow: hidden;
}
.cal-cell.empty { background: transparent; border: none; }
.cal-cell.today { border-color: var(--navy); border-width: 1.5px; }
.cal-daynum { font-size: 11px; font-weight: 600; color: var(--text-2); flex-shrink: 0; }
.cal-chips { display: flex; flex-direction: column; gap: 3px; overflow-y: auto; flex: 1; min-height: 0; }
.cal-chip {
  font-size: 10px; padding: 2px 6px; border-radius: 5px; cursor: grab;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  border: 1px solid var(--border-strong); background: var(--bg); color: var(--text-2);
  display: flex; align-items: center; gap: 4px; justify-content: space-between;
}
/* Task chips are colored per-desk via inline style (DESKS ic_bg/ic_color),
   not by priority — priority already has its own dedicated display on the
   desk pages and the top KPI strip, so the calendar's job is "which desk". */
.cal-chip.meeting { background: #EEEDFE; color: #534AB7; border-color: #D6D3FB; }
.cal-chip.task.done { text-decoration: line-through; opacity: 0.6; cursor: default; }
.chip-del { cursor: pointer; opacity: 0.6; flex-shrink: 0; }
.chip-del:hover { opacity: 1; }
.unscheduled-tray {
  display: flex; flex-wrap: wrap; gap: 6px; padding: 10px;
  background: var(--surface); border: 1px dashed var(--border-strong);
  border-radius: 10px; margin-bottom: 6px; min-height: 40px;
}

/* ── DOC LINKS ── */
.link-icon {
  width: 28px; height: 28px; border-radius: 7px; background: var(--bg);
  display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0;
}

/* ── KPI MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(15,20,30,0.45); z-index: 300;
  display: flex; align-items: center; justify-content: center; padding: 24px;
}
.modal-panel {
  background: var(--surface); border-radius: 12px; width: 100%; max-width: 540px;
  max-height: 80vh; display: flex; flex-direction: column;
  box-shadow: 0 12px 40px rgba(0,0,0,0.2);
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.modal-title { font-size: 15px; font-weight: 700; color: var(--text); }
.modal-list { padding: 10px; overflow-y: auto; }
.modal-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 10px;
  border-radius: 8px; cursor: pointer; transition: background 0.1s;
}
.modal-item:hover { background: var(--bg); }

/* ── LOCK SCREEN ── */
.lock-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(160deg, var(--navy) 0%, #142744 100%);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.lock-card {
  background: var(--surface);
  border-radius: 14px;
  padding: 28px 26px;
  width: 100%; max-width: 320px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.35);
}
.lock-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.lock-sub { font-size: 12px; color: var(--muted); margin-bottom: 18px; }
.lock-input {
  width: 100%;
  font-size: 28px;
  letter-spacing: 14px;
  text-align: center;
  padding: 10px 0;
  border: 1px solid var(--border-strong);
  border-radius: 8px;
  outline: none;
  font-family: inherit;
  color: var(--text);
}
.lock-input:focus { border-color: var(--navy); }
.lock-error { font-size: 11px; color: var(--p1-color); margin-top: 8px; }
.lock-forgot {
  display: block;
  margin: 14px auto 0;
  font-size: 11px;
  color: var(--muted);
  background: none; border: none; cursor: pointer;
  text-decoration: underline;
}
.lock-forgot:hover { color: var(--navy); }

/* ── MOBILE HAMBURGER (hidden on desktop) ── */
.hamburger-btn {
  display: none;
  width: 34px; height: 34px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.08);
  color: #fff;
  align-items: center; justify-content: center;
  font-size: 16px;
  cursor: pointer;
  flex-shrink: 0;
}

.topbar-icon-btn {
  display: flex;
  width: 34px; height: 34px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.08);
  color: #fff;
  align-items: center; justify-content: center;
  font-size: 16px;
  cursor: pointer;
  flex-shrink: 0;
}
.topbar-icon-btn:hover { background: rgba(255,255,255,0.16); }

.rail-backdrop { display: none; }

/* ── CALENDAR SCROLL WRAPPER (used on mobile) ── */
.cal-scroll { }

/* ── RESPONSIVE / MOBILE ── */
@media (max-width: 860px) {
  :root { --rail-w: 260px; --top-h: 140px; }

  .hamburger-btn { display: flex; }

  .topbar { padding: 0 14px; gap: 8px; }
  .brand-sub { display: none; }
  .brand-name { font-size: 12px; }
  .kpi-strip { grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .kpi { padding: 6px 9px; }
  .kpi-val { font-size: 16px; }
  .kpi-label { font-size: 9px; }

  .rail {
    transform: translateX(-100%);
    transition: transform 0.2s ease;
    box-shadow: 2px 0 24px rgba(0,0,0,0.18);
    z-index: 210;
  }
  .rail.open { transform: translateX(0); }

  .rail-backdrop {
    display: block;
    position: fixed;
    top: var(--top-h); left: 0; right: 0; bottom: 0;
    background: rgba(10,15,25,0.4);
    z-index: 205;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .rail-backdrop.open { opacity: 1; pointer-events: auto; }

  .main { margin-left: 0; padding: 16px 14px 32px; }

  .desk-header { flex-direction: column; align-items: stretch; gap: 10px; }
  .desk-actions { justify-content: flex-start; flex-wrap: wrap; }

  .task-main { padding: 11px; gap: 10px; flex-wrap: wrap; }
  .task-body { min-width: 180px; }

  .notes-layout { flex-direction: column-reverse; }
  .notes-outline { width: 100%; }
  .task-controls { width: 100%; max-width: 100%; justify-content: flex-start; margin-top: 4px; padding-left: 30px; }

  .add-task-area { flex-direction: column; align-items: stretch; }
  .add-task-area .add-icon { display: none; }
  .add-priority-select, .add-task-area input[type="date"], .add-task-area input[type="time"] { width: 100%; }

  .cal-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -14px; padding: 0 14px; }
  .cal-dow, .cal-grid { min-width: 600px; }

  .ov-grid { grid-template-columns: 1fr; }
  .g2, .g3, .g4 { grid-template-columns: 1fr; }

  .modal-overlay { padding: 12px; align-items: flex-end; }
  .modal-panel { max-width: 100%; max-height: 85vh; }
}

@media (max-width: 420px) {
  .brand-name { font-size: 11px; }
  .topbar-date { font-size: 10px; }
  .kpi-val { font-size: 15px; }
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
</style>
</head>
<body>

<!-- LOCK SCREEN (shown until the on-device passcode is entered) -->
<div id="lock-overlay" class="lock-overlay"></div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-row1">
    <div style="display:flex;align-items:center;gap:10px;min-width:0">
      <button class="hamburger-btn" onclick="toggleRail()" aria-label="Open menu">☰</button>
      <div class="brand">
        <div class="brand-mark">QP</div>
        <div>
          <div class="brand-name">Qualitech Philippines</div>
          <div class="brand-sub">CEO Morning Dashboard</div>
        </div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <button class="topbar-icon-btn" onclick="openSearchModal()" aria-label="Search tasks" title="Search tasks (/)">🔎</button>
      <div class="topbar-date" id="topbar-date"></div>
    </div>
  </div>
  <div class="kpi-strip">
    <button class="kpi" onclick="openKpiModal('overdue')" title="Click to see the full list">
      <div class="kpi-label">Overdue</div>
      <div class="kpi-val danger" id="kpi-overdue">0</div>
    </button>
    <button class="kpi" onclick="openKpiModal('p1')" title="Click to see the full list">
      <div class="kpi-label">Due today</div>
      <div class="kpi-val warn" id="kpi-p1">0</div>
    </button>
    <button class="kpi" onclick="openKpiModal('open')" title="Click to see the full list">
      <div class="kpi-label">In progress</div>
      <div class="kpi-val" id="kpi-open">0</div>
    </button>
    <button class="kpi" onclick="openKpiModal('done')" title="Click to see the full list">
      <div class="kpi-label">Done today</div>
      <div class="kpi-val ok" id="kpi-done">0</div>
    </button>
  </div>
</div>

<!-- SHELL -->
<div class="shell">

  <!-- LEFT RAIL -->
  <nav class="rail">
    <div id="rail-nav-content"></div>
    <div class="rail-footer">
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <button class="btn" style="flex:1;font-size:11px;padding:6px 8px" onclick="exportBackup()">⬇ Export</button>
        <button class="btn" style="flex:1;font-size:11px;padding:6px 8px" onclick="document.getElementById('import-file-input').click()">⬆ Import</button>
      </div>
      <input type="file" id="import-file-input" accept="application/json" style="display:none" onchange="importBackup(event)">
      <div id="sync-status-row" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-top:8px;border-top:1px solid var(--border)">
        <span id="sync-status-text" style="font-size:11px;color:var(--muted)">☁ Cloud sync: off</span>
        <button class="btn" id="sync-action-btn" style="font-size:11px;padding:4px 8px" onclick="openSyncModal()">Connect</button>
      </div>
      <div id="notif-status-row" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-top:8px;border-top:1px solid var(--border)"></div>
      <div id="lock-status-row" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-top:8px;border-top:1px solid var(--border)"></div>
      Auto-saved to this browser.<br>
      Data stays on your device.
    </div>
  </nav>
  <div class="rail-backdrop" onclick="closeRailMobile()"></div>

  <!-- MAIN -->
  <main class="main" id="main-content"></main>

</div>

<div id="modal-root"></div>

<script>
// ── DESKS (reordered: 4,1,2,6,3,5,7 → new 01–07) ─────────────────────────────
const DESKS = [
  { id:'email', num:'01', name:'Email, investors & loans', sub:'Correspondence, relations, follow-ups', icon:'📬', ic_bg:'#E6F1FB', ic_color:'#185FA5' },
  { id:'fin',   num:'02', name:'Financial',                sub:'Branch P&L, collections, variances',    icon:'📊', ic_bg:'#E1F5EE', ic_color:'#0F6E56' },
  { id:'pay',   num:'03', name:'Payables & loans',         sub:'Bills, debt repayment, priority queue', icon:'🧾', ic_bg:'#FAECE7', ic_color:'#993C1D' },
  { id:'mkt',   num:'04', name:'Marketing',                sub:'Approvals, designer briefs, calendar',  icon:'📣', ic_bg:'#EEEDFE', ic_color:'#534AB7' },
  { id:'ops',   num:'05', name:'Operational',              sub:'Staff, supplies, quality, branch issues',icon:'⚙️', ic_bg:'#FBEAF0', ic_color:'#993556' },
  { id:'dev',   num:'06', name:'Business Development',     sub:'New branches, site selection, contractor coordination', icon:'🏗️', ic_bg:'#FAEEDA', ic_color:'#854F0B' },
  { id:'report',num:'07', name:'Company review',           sub:'Snapshots, partner updates, scorecard', icon:'📋', ic_bg:'#EAF3DE', ic_color:'#3B6D11' },
  { id:'legal', num:'08', name:'Legal and Administrative', sub:'Permits, registrations, SEC/FDA & compliance filings', icon:'⚖️', ic_bg:'#ECEDF2', ic_color:'#37415C' },
];

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

// Named to match the top-of-dashboard KPI titles (e.g. "Overdue") instead of
// a bare "P1" so the priority a task carries reads the same way everywhere.
const PRIORITY_LABELS = { p1:'Overdue (P1)', p2:'Urgent (P2)', p3:'Complete Today (P3)', p4:'Not Urgent (P4)' };
function priorityOptionsHtml(current) {
  return Object.keys(PRIORITY_LABELS).map(k => `<option value="${k}" ${k === current ? 'selected' : ''}>${PRIORITY_LABELS[k]}</option>`).join('');
}

// Only meaningful on the Payables & loans desk — lets an entry there be
// filed as a one-off action item ("call the bank") vs. an actual amount
// owed with a due date, so the calendar panel can list them separately.
const KIND_LABELS = { task:'Task', payment:'Payment' };
function kindOptionsHtml(current) {
  return Object.keys(KIND_LABELS).map(k => `<option value="${k}" ${k === current ? 'selected' : ''}>${KIND_LABELS[k]}</option>`).join('');
}

function fmtCost(n) {
  return '₱' + Number(n).toLocaleString('en-PH', { maximumFractionDigits: 2 });
}

const STATUS_LABELS = { 'not-started':'Not started', 'in-progress':'In progress', 'blocked':'Blocked', 'done':'Done' };
const STATUS_CYCLE  = { 'not-started':'in-progress', 'in-progress':'blocked', 'blocked':'done', 'done':'not-started' };

const KPI_META = {
  p1:      { title: 'Due today',                     filter: t => !t.done && t.date === fmtDate(new Date()) },

const STORE_KEY = 'qualitech_dashboard_v2';

function normalizeTask(t) {
  if (t.date === undefined) t.date = '';
  if (t.status === undefined) t.status = t.done ? 'done' : 'not-started';
  if (t.link === undefined) t.link = '';
  if (t.completedAt === undefined) t.completedAt = t.done ? '' : null;
  if (t.kind === undefined) t.kind = 'task';
  if (t.cost === undefined) t.cost = null;
  // Legacy tasks (saved before this field existed) default to today rather
  // than an unknown past date, so they don't immediately show as stale.
  if (t.createdAt === undefined) t.createdAt = fmtDate(new Date());
  return t;
}

function freshDefaultState() {
  const desks = JSON.parse(JSON.stringify(DEFAULT_TASKS));
  Object.keys(desks).forEach(k => desks[k].forEach(normalizeTask));
  return { desks, meetings: [], docLinks: [], notes: [], morningCheck: { date: '', desks: [] }, checklistStreak: { count: 0, lastDate: '' } };
}

// One-time migration: browsers with data saved before the "Legal and
// Administrative" desk existed keep their permit/SEC/FDA tasks under the
// old "Branch dev & legal" (dev) desk, filed under ids dev1/dev3/dev4.
function migrateLegalDesk(parsed) {
  if (!parsed.desks.dev || parsed.desks.legal) return;
  const legacyLegalIds = ['dev1', 'dev3', 'dev4'];
  const migrated = [];
  parsed.desks.dev = parsed.desks.dev.filter(t => {
    if (legacyLegalIds.includes(t.id)) { migrated.push(t); return false; }
    return true;
  });
  parsed.desks.legal = migrated.length > 0 ? migrated : JSON.parse(JSON.stringify(DEFAULT_TASKS.legal || []));
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (!parsed.desks) parsed.desks = {};
      migrateLegalDesk(parsed);
      DESKS.forEach(d => {
        if (!parsed.desks[d.id]) parsed.desks[d.id] = JSON.parse(JSON.stringify(DEFAULT_TASKS[d.id] || []));
      });
      Object.keys(parsed.desks).forEach(k => parsed.desks[k].forEach(normalizeTask));
      if (!parsed.meetings) parsed.meetings = [];
      if (!parsed.docLinks) parsed.docLinks = [];
      if (!parsed.notes) parsed.notes = [];
      if (!parsed.morningCheck) parsed.morningCheck = { date: '', desks: [] };
      if (!parsed.checklistStreak) parsed.checklistStreak = { count: 0, lastDate: '' };
      return parsed;
    }
  } catch(e) {}
  return freshDefaultState();
}

function saveState() {
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
  scheduleCloudSync();
}

// The due date always wins over whatever priority was manually set: an open
// task past its due date is Overdue (p1); an open task due today is Urgent
// (p2). This doesn't touch the stored t.priority, so it reverts
// automatically if the date is pushed forward or cleared.
function effectivePriority(t) {
  if (t.done || !t.date) return t.priority;
  const today = fmtDate(new Date());
  if (t.date < today) return 'p1';
  if (t.date === today) return 'p2';
  return t.priority;
}

// ── KPIs ───────────────────────────────────────────────────────────────────────

function computeKpis() {
  let dueToday=0, overdue=0, open=0, done=0;
  const today = fmtDate(new Date());
  DESKS.forEach(d => {
    const tasks = state.desks[d.id] || [];
    tasks.forEach(t => {
      if (t.done) { if (t.completedAt === today) done++; return; }
      if (t.date === today) dueToday++;
      if (effectivePriority(t) === 'p1') overdue++;
      open++;
    });
  });
  document.getElementById('kpi-p1').textContent = dueToday;
  document.getElementById('kpi-overdue').textContent = overdue;
  document.getElementById('kpi-open').textContent = open;
  document.getElementById('kpi-done').textContent = done;
}

function deskUrgency(deskId) {
  const tasks = (state.desks[deskId] || []).filter(t => !t.done);
  if (tasks.some(t => effectivePriority(t) === 'p1')) return 'p1';
  if (tasks.some(t => effectivePriority(t) === 'p2')) return 'p2';
  return tasks.length > 0 ? 'ok' : 'empty';
}

function deskOpenCount(deskId) {
  return (state.desks[deskId] || []).filter(t => !t.done).length;
}

function stripHtml(html) {
  return (html || '').replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
}

// One combined search across everything the dashboard holds — tasks, the
// notes log, document links, and meetings — tagged by kind so results can
// route to the right page/entry when clicked.
function searchAll(query) {
  const q = query.trim().toLowerCase();
  if (!q) return [];
  const results = [];

  allTasksFlat().forEach(({t, d}) => {
    if ((t.title || '').toLowerCase().includes(q) || (t.meta || '').toLowerCase().includes(q) || (t.notes || '').toLowerCase().includes(q)) {
      results.push({ kind: 'task', t, d });
    }
  });

  (state.notes || []).forEach(n => {
    const plain = stripHtml(n.html);
    if ((n.title || '').toLowerCase().includes(q) || plain.toLowerCase().includes(q) || (n.tags || []).some(tag => tag.toLowerCase().includes(q))) {
      results.push({ kind: 'note', n, snippet: plain.slice(0, 90) });
    }
  });

  (state.docLinks || []).forEach(l => {
    if ((l.label || '').toLowerCase().includes(q) || (l.url || '').toLowerCase().includes(q)) {
      results.push({ kind: 'link', l });
    }
  });

  (state.meetings || []).forEach(m => {
    if ((m.title || '').toLowerCase().includes(q)) {
      results.push({ kind: 'meeting', m });
    }
  });

  return results;
}

function openSearchResult(r) {
  closeModal();
  if (r.kind === 'task') {
    switchView(r.d.id);
  } else if (r.kind === 'note') {

    switchView('notes');
  } else if (r.kind === 'link') {
    switchView('links');
  } else if (r.kind === 'meeting') {
    const d = new Date(r.m.date + 'T00:00:00');
    calYear = d.getFullYear(); calMonth = d.getMonth();
    switchView('calendar');
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key !== '/') return;
  const tag = (e.target && e.target.tagName || '').toLowerCase();
  if (tag === 'input' || tag === 'textarea' || (e.target && e.target.isContentEditable)) return;
  if (document.getElementById('search-input')) return;
  e.preventDefault();
  openSearchModal();
});

// Non-blocking replacements for confirm()/alert()/prompt(). Native dialogs
// pause the main thread until the user responds, which shows up as a long
// "blocked" event handler (and a bad INP score) for however long the user
// takes to read and click — a modal that just waits for a later click
// doesn't have that problem, since the original event handler returns
// immediately.
function showConfirmModal(message, onConfirm, opts) {

  document.getElementById('modal-root').innerHTML = html;

      <button class="desk-btn ${d.id === activeView ? 'active' : ''}" onclick="switchView('${d.id}')">
        <div class="desk-icon" style="background:${d.ic_bg};color:${d.ic_color}">${d.icon}</div>
        <div class="desk-info">
          <div class="desk-num">${d.num}</div>
          <div class="desk-name-text">${d.name}</div>
        </div>
        <div class="desk-count ${countCls}">${count}</div>
      </button>`;
  });

  html += `
    <div class="rail-section-label">Resources</div>
    <button class="desk-btn ${activeView==='links' ? 'active' : ''}" onclick="switchView('links')">
      <div class="desk-icon" style="background:#F7F8FA;color:#4A5568">🔗</div>
      <div class="desk-info"><div class="desk-name-text">Document links</div></div>
    </button>`;

  nav.innerHTML = html;
}

function switchView(id) {
  activeView = id;
  doneSectionExpanded = false;
  renderNav();
  renderMain();
  closeRailMobile();
}

function toggleDoneExpanded() {
  doneSectionExpanded = !doneSectionExpanded;
  renderAll();
}

function toggleRail() {
  const rail = document.querySelector('.rail');
  const backdrop = document.querySelector('.rail-backdrop');
  if (rail) rail.classList.toggle('open');
  if (backdrop) backdrop.classList.toggle('open');
}

function closeRailMobile() {
  const rail = document.querySelector('.rail');
  const backdrop = document.querySelector('.rail-backdrop');
  if (rail) rail.classList.remove('open');
  if (backdrop) backdrop.classList.remove('open');
}

function renderMain() {
  if (activeView === 'overview') { renderOverviewMain(); return; }
  if (activeView === 'calendar') { renderCalendarMain(); return; }
  if (activeView === 'notes') { renderNotesMain(); return; }
  if (activeView === 'links') { renderLinksMain(); return; }
  renderDeskMain();
}

const PRIORITY_CHART_COLORS = { p1: '#E74C3C', p2: '#F0C419', p3: '#9B59B6', p4: '#CBD5E0' };

function renderProductivityCharts() {
  const allTasks = allTasksFlat();
  const openTasks = allTasks.filter(x => !x.t.done);
  const totalCount = allTasks.length;
  const doneCount = totalCount - openTasks.length;
  const completionPct = totalCount ? Math.round((doneCount / totalCount) * 100) : 0;

  const priorityCounts = { p1: 0, p2: 0, p3: 0, p4: 0 };
  openTasks.forEach(({ t }) => { priorityCounts[effectivePriority(t)]++; });
  const openTotal = openTasks.length;

  const deskLoad = DESKS.map(d => ({ d, open: (state.desks[d.id] || []).filter(t => !t.done).length }))
    .sort((a, b) => b.open - a.open);
  const maxDeskOpen = Math.max(1, ...deskLoad.map(x => x.open));

  const segmentsHtml = openTotal === 0
    ? `<div style="flex:1;background:var(--border)"></div>`
    : ['p1', 'p2', 'p3', 'p4'].filter(k => priorityCounts[k] > 0).map(k =>
        `<div style="flex:${priorityCounts[k]};background:${PRIORITY_CHART_COLORS[k]}" title="${PRIORITY_LABELS[k]}: ${priorityCounts[k]}"></div>`
      ).join(`<div style="width:2px;background:var(--surface);flex-shrink:0"></div>`);

  const legendHtml = ['p1', 'p2', 'p3', 'p4'].map(k => `
    <span class="prod-legend-item">
      <span class="prod-legend-swatch" style="background:${PRIORITY_CHART_COLORS[k]}"></span>
      ${PRIORITY_LABELS[k]} — ${priorityCounts[k]}
    </span>`).join('');

  const deskBarsHtml = deskLoad.map(({ d, open }) => `
    <div class="prod-bar-row">
      <div class="prod-bar-label">${d.icon} ${escHtml(d.name)}</div>
      <div class="prod-bar-track"><div class="prod-bar-fill" style="width:${maxDeskOpen ? (open / maxDeskOpen * 100) : 0}%"></div></div>
      <div class="prod-bar-value">${open}</div>
    </div>`).join('');

  return `
    <div class="section-divider">
      <span class="section-divider-label">Productivity snapshot</span>
      <div class="section-divider-line"></div>
    </div>
    <div class="prod-grid">
      <div class="prod-card">
        <div class="prod-card-title">Completion rate</div>
        <div class="prod-meter-row">
          <div class="prod-meter-track"><div class="prod-meter-fill" style="width:${completionPct}%"></div></div>
          <div class="prod-meter-value">${completionPct}%</div>
        </div>
        <div class="prod-card-sub">${doneCount} of ${totalCount} tasks completed</div>
      </div>
      <div class="prod-card">
        <div class="prod-card-title">Open task mix by priority</div>
        <div class="prod-stack">${segmentsHtml}</div>
        <div class="prod-legend">${legendHtml}</div>
      </div>
      <div class="prod-card prod-card-wide">
        <div class="prod-card-title">Open tasks by desk</div>
        <div class="prod-bars">${deskBarsHtml}</div>
      </div>
    </div>`;
}

function ensureMorningCheckFresh() {
  const today = fmtDate(new Date());
  if (state.morningCheck.date !== today) {
    state.morningCheck = { date: today, desks: [] };
    saveState();
  }
}

function toggleMorningCheck(deskId) {
  ensureMorningCheckFresh();
  const i = state.morningCheck.desks.indexOf(deskId);
  if (i === -1) state.morningCheck.desks.push(deskId); else state.morningCheck.desks.splice(i, 1);
  updateChecklistStreak();
  saveState();
  renderOverviewMain();
}

// Advances the streak the first time all desks get reviewed on a given day;
// doesn't reverse it if a desk gets unchecked again afterward — this is a
// light habit-tracking nudge, not an audit trail.
function updateChecklistStreak() {
  const today = fmtDate(new Date());
  if (!DESKS.every(d => state.morningCheck.desks.includes(d.id))) return;
  if (!state.checklistStreak) state.checklistStreak = { count: 0, lastDate: '' };
  if (state.checklistStreak.lastDate === today) return;
  const yesterday = fmtDate(new Date(Date.now() - 86400000));
  state.checklistStreak.count = state.checklistStreak.lastDate === yesterday ? state.checklistStreak.count + 1 : 1;
  state.checklistStreak.lastDate = today;
}

function resetMorningChecklist() {
  showConfirmModal("Reset today's morning checklist? This only clears your review progress, not any task data.", () => {
    state.morningCheck = { date: fmtDate(new Date()), desks: [] };
    saveState();
    renderOverviewMain();
  }, { danger: false, confirmLabel: 'Reset' });
}

function renderMorningChecklist() {
  ensureMorningCheckFresh();
  const checkedSet = new Set(state.morningCheck.desks);
  const checkedCount = DESKS.filter(d => checkedSet.has(d.id)).length;
  const pct = DESKS.length ? Math.round((checkedCount / DESKS.length) * 100) : 0;

  const itemsHtml = DESKS.map(d => {
    const tasks = state.desks[d.id] || [];
    const open = tasks.filter(t => !t.done);
    const overdueCount = open.filter(t => effectivePriority(t) === 'p1').length;
    const checked = checkedSet.has(d.id);
    return `
      <div class="checklist-item ${checked ? 'checked' : ''}" onclick="toggleMorningCheck('${d.id}')">
        <div class="task-check ${checked ? 'checked' : ''}"></div>
        <div class="desk-icon" style="background:${d.ic_bg};color:${d.ic_color}">${d.icon}</div>
        <div class="checklist-label">${escHtml(d.name)}</div>
        <div class="checklist-sub">${open.length} open${overdueCount > 0 ? ` · ${overdueCount} overdue` : ''}</div>
        <button class="btn" onclick="event.stopPropagation(); switchView('${d.id}')">Review →</button>
      </div>`;
  }).join('');

  return `
    <div class="checklist-card">
      <div class="checklist-header">
        <div class="checklist-title">☀️ Morning checklist — ${checkedCount} of ${DESKS.length} desks reviewed
          ${state.checklistStreak && state.checklistStreak.count > 0 ? `<span style="font-size:11px;color:var(--muted);font-weight:400;margin-left:6px">🔥 ${state.checklistStreak.count}-day streak</span>` : ''}
        </div>
        <button class="btn" style="font-size:11px;padding:4px 8px" onclick="resetMorningChecklist()">Reset</button>
      </div>
      <div class="checklist-track"><div class="checklist-fill" style="width:${pct}%"></div></div>
      ${itemsHtml}
    </div>`;
}

function payablesRollup() {
  const today = fmtDate(new Date());
  const weekEnd = fmtDate(new Date(Date.now() + 7 * 86400000));
  const open = (state.desks.pay || []).filter(t => !t.done && t.kind === 'payment' && typeof t.cost === 'number');
  const total = open.reduce((sum, t) => sum + t.cost, 0);
  const overdue = open.filter(t => t.date && t.date < today).reduce((sum, t) => sum + t.cost, 0);
  const dueThisWeek = open.filter(t => t.date && t.date >= today && t.date <= weekEnd).reduce((sum, t) => sum + t.cost, 0);
  return { total, overdue, dueThisWeek, count: open.length };
}

function buildDailyBriefText() {
  const today = fmtDate(new Date());
  const lines = [`Qualitech Philippines — Morning brief — ${fmtDisplayDate(today)}`, ''];

  const overdue = [], dueToday = [];
  DESKS.forEach(d => {
    (state.desks[d.id] || []).forEach(t => {
      if (t.done) return;
      if (effectivePriority(t) === 'p1') overdue.push({ t, d });
      else if (t.date === today) dueToday.push({ t, d });
    });
  });

  lines.push(`OVERDUE (${overdue.length})`);
  lines.push(...(overdue.length ? overdue.map(({t, d}) => `  • [${d.name}] ${t.title}`) : ['  None.']));
  lines.push('', `DUE TODAY (${dueToday.length})`);
  lines.push(...(dueToday.length ? dueToday.map(({t, d}) => `  • [${d.name}] ${t.title}`) : ['  None.']));

  const rollup = payablesRollup();
  const payDue = (state.desks.pay || []).filter(t => !t.done && t.kind === 'payment' && t.date && t.date <= today);
  lines.push('', `PAYABLES — ${fmtCost(rollup.total)} outstanding, ${fmtCost(rollup.overdue)} overdue`);
  lines.push(...(payDue.length ? payDue.map(t => `  • ${t.title}${typeof t.cost === 'number' ? ' — ' + fmtCost(t.cost) : ''}`) : ['  Nothing due or overdue today.']));

  const meetingsToday = (state.meetings || []).filter(m => m.date === today).sort((a, b) => (a.time || '').localeCompare(b.time || ''));
  lines.push('', `MEETINGS TODAY (${meetingsToday.length})`);
  lines.push(...(meetingsToday.length ? meetingsToday.map(m => `  • ${m.time ? m.time + ' — ' : ''}${m.title}`) : ['  None.']));

  return lines.join('\n');
}

function openDailyBriefModal() {
  const text = buildDailyBriefText();
  const html = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal-panel" style="max-width:480px">
        <div class="modal-header">
          <div class="modal-title">Today's brief</div>
          <button class="delete-btn" style="opacity:1" onclick="closeModal()">✕</button>
        </div>
        <div style="padding:12px 18px 18px">
          <textarea id="daily-brief-text" readonly rows="14" style="width:100%;box-sizing:border-box;font-family:ui-monospace,monospace;font-size:12px;padding:10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);white-space:pre-wrap" onclick="this.select()">${escHtml(text)}</textarea>
          <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:10px">
            <span id="daily-brief-status" style="font-size:11px;color:var(--muted)">Click the box to select all, or use the button.</span>
            <button class="btn btn-primary" style="flex-shrink:0" onclick="copyDailyBrief()">📋 Copy</button>
          </div>
        </div>
      </div>
    </div>`;
  document.getElementById('modal-root').innerHTML = html;
}

function copyDailyBrief() {
  const ta = document.getElementById('daily-brief-text');
  const text = ta ? ta.value : buildDailyBriefText();
  const status = document.getElementById('daily-brief-status');
  const setStatus = (ok) => { if (status) status.textContent = ok ? '✓ Copied to clipboard.' : 'Could not copy automatically — select the text above and copy it manually.'; };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => setStatus(true)).catch(() => setStatus(false));
  } else {
    setStatus(false);
  }
}

function renderOverviewMain() {
  const rollup = payablesRollup();
  let html = `
    <div class="desk-header">
      <div class="desk-title-area">
        <div class="desk-title">🏢 Company overview</div>
        <div class="desk-desc">Aggregate snapshot across all desks — start here each morning.</div>
      </div>
      <div class="desk-actions">
        <button class="btn" onclick="openDailyBriefModal()">📋 Copy today's brief</button>
      </div>
    </div>`;

  html += renderMorningChecklist();

  if (rollup.count > 0) {
    html += `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px;display:flex;gap:28px;flex-wrap:wrap;align-items:center">
        <div style="font-size:12px;font-weight:600;color:var(--text-2)">🧾 Payables outstanding</div>
        <div><div style="font-size:10px;color:var(--muted)">Total outstanding</div><div style="font-size:16px;font-weight:700">${fmtCost(rollup.total)}</div></div>
        ${rollup.overdue > 0 ? `<div><div style="font-size:10px;color:var(--muted)">Overdue</div><div style="font-size:16px;font-weight:700;color:var(--p1-color)">${fmtCost(rollup.overdue)}</div></div>` : ''}
        <div><div style="font-size:10px;color:var(--muted)">Due within 7 days</div><div style="font-size:16px;font-weight:700">${fmtCost(rollup.dueThisWeek)}</div></div>
        <button class="btn" style="margin-left:auto;font-size:11px;padding:4px 8px" onclick="switchView('pay')">View →</button>
      </div>`;
  }

  html += `<div class="ov-grid">`;

  DESKS.forEach(d => {
    const tasks = state.desks[d.id] || [];
    const open = tasks.filter(t => !t.done);
    const p1 = open.filter(t => effectivePriority(t) === 'p1').length;
    const p2 = open.filter(t => effectivePriority(t) === 'p2').length;
    html += `
      <div class="ov-card" onclick="switchView('${d.id}')">
        <div class="ov-card-top">
          <div class="desk-icon" style="background:${d.ic_bg};color:${d.ic_color}">${d.icon}</div>
          <div>
            <div class="ov-card-title">${d.name}</div>
            <div class="ov-card-sub">${open.length} open</div>
          </div>
        </div>
        <div class="ov-card-counts">
          ${p1 > 0 ? `<span class="ov-pill p1">${p1} P1</span>` : ''}
          ${p2 > 0 ? `<span class="ov-pill p2">${p2} P2</span>` : ''}
          ${p1 === 0 && p2 === 0 ? `<span class="ov-pill ok">Clear</span>` : ''}
        </div>
      </div>`;
  });
  html += `</div>`;

  html += renderProductivityCharts();

  const today = fmtDate(new Date());
  const decisionItems = [];
  DESKS.forEach(d => { (state.desks[d.id] || []).forEach(t => {
    if (!t.done && (effectivePriority(t) === 'p1' || t.date === today)) decisionItems.push({ t, d });
  }); });
  decisionItems.sort((a, b) => (effectivePriority(a.t) === 'p1' ? 0 : 1) - (effectivePriority(b.t) === 'p1' ? 0 : 1));

  html += `
    <div class="section-divider">
      <span class="section-divider-label">Needs a decision today — overdue &amp; due today, all desks</span>
      <div class="section-divider-line"></div>
    </div>`;

  if (decisionItems.length === 0) {
    html += `<div class="empty-state"><div class="empty-icon">✓</div><div class="empty-text">Nothing overdue or due today. Good morning.</div></div>`;
  } else {
    html += `<div class="tasks-list">`;
    decisionItems.forEach(({t, d}) => {
      html += `
        <div class="task-card ${effectivePriority(t)}" style="cursor:pointer" onclick="switchView('${d.id}')">
          <div class="task-main">
            <div class="task-check" onclick="event.stopPropagation(); toggleDone('${t.id}')"></div>
            <div class="task-body">
              <div style="font-size:10px;color:var(--muted);font-weight:600;margin-bottom:2px">${d.icon} ${d.name}</div>
              <div style="font-size:13px;font-weight:500">${escHtml(t.title)}</div>
              ${t.meta ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">${escHtml(t.meta)}</div>` : ''}
            </div>
          </div>
        </div>`;
    });
    html += `</div>`;
  }

  document.getElementById('main-content').innerHTML = html;
}

// ── DESK MAIN ──────────────────────────────────────────────────────────────────

function renderDeskMain() {
  const desk = DESKS.find(d => d.id === activeView);
  const tasks = state.desks[activeView] || [];
  const open = tasks.filter(t => !t.done);
  const done = tasks.filter(t => t.done)
    .sort((a, b) => (b.completedAt || '').localeCompare(a.completedAt || ''));

  const openByP = {
    p1: open.filter(t => effectivePriority(t) === 'p1'),
    p2: open.filter(t => effectivePriority(t) === 'p2'),
    p3: open.filter(t => effectivePriority(t) === 'p3'),
    p4: open.filter(t => effectivePriority(t) === 'p4'),
  };

  let html = `
    <div class="desk-header">
      <div class="desk-title-area">
        <div class="desk-title">${desk.icon} ${desk.name}</div>
        <div class="desk-desc">${desk.sub}</div>
      </div>
      <div class="desk-actions">
        <button class="btn" onclick="openBulkAddModal('${activeView}')">＋ Bulk add</button>
        ${done.length > 0 ? `<button class="btn btn-danger" onclick="clearDone()">Clear ${done.length} done</button>` : ''}
        <button class="btn" onclick="resetDesk()">Reset desk</button>
      </div>
    </div>

    <div class="add-task-area" onclick="document.getElementById('add-input-${activeView}').focus()">
      <div class="add-icon">+</div>
      <input class="add-input" id="add-input-${activeView}" placeholder="Add a task… press Enter to save" style="flex:2"
        onkeydown="handleAddKey(event, '${activeView}')">
      <input class="add-input" id="add-link-${activeView}" type="url" placeholder="Link (optional)" style="flex:1"
        onclick="event.stopPropagation()" onkeydown="handleAddKey(event, '${activeView}')">
      ${activeView === 'pay' ? `<input class="add-input" id="add-cost-${activeView}" type="number" min="0" step="0.01" placeholder="Amount (₱)" style="flex:0 0 130px"
        onclick="event.stopPropagation()" onkeydown="handleAddKey(event, '${activeView}')">` : ''}
      ${activeView === 'pay' ? `<select class="add-priority-select" id="add-kind-${activeView}" onclick="event.stopPropagation()">${kindOptionsHtml('payment')}</select>` : ''}
      <select class="add-priority-select" id="add-priority-${activeView}" onclick="event.stopPropagation()">${priorityOptionsHtml('p2')}</select>
      <button class="btn btn-primary" onclick="event.stopPropagation(); addTask('${activeView}')">＋ Add</button>
    </div>

    <div class="tasks-list" id="tasks-list">`;

  const sections = [
    { key:'p1', label: PRIORITY_LABELS.p1, tasks: openByP.p1 },
    { key:'p2', label: PRIORITY_LABELS.p2, tasks: openByP.p2 },
    { key:'p3', label: PRIORITY_LABELS.p3, tasks: openByP.p3 },
    { key:'p4', label: PRIORITY_LABELS.p4, tasks: openByP.p4 },
  ];

  let anySections = false;
  sections.forEach(s => {
    if (s.tasks.length === 0) return;
    anySections = true;
    html += `
      <div class="section-divider">
        <span class="section-divider-label">${s.label}</span>
        <div class="section-divider-line"></div>
      </div>`;
    s.tasks.forEach(t => { html += taskCardHTML(t); });
  });

  if (done.length > 0) {
    const COLLAPSE_AT = 10;
    const showAll = doneSectionExpanded || done.length <= COLLAPSE_AT;
    const visibleDone = showAll ? done : done.slice(0, COLLAPSE_AT);
    html += `
      <div class="section-divider">
        <span class="section-divider-label">Tasks Completed (${done.length})</span>
        <div class="section-divider-line"></div>
      </div>`;
    visibleDone.forEach(t => { html += taskCardHTML(t); });
    if (done.length > COLLAPSE_AT) {
      html += `<button class="btn" style="width:100%;margin-top:6px" onclick="toggleDoneExpanded()">${showAll ? 'Show fewer' : `Show ${done.length - COLLAPSE_AT} more completed`}</button>`;
    }
  }

  if (!anySections && done.length === 0) {
    html += `
      <div class="empty-state">
        <div class="empty-icon">✓</div>
        <div class="empty-text">All clear — add items above as they come in.</div>
      </div>`;
  }

  html += `</div>`;

  document.getElementById('main-content').innerHTML = html;
}

          ${activeView === 'pay' && t.kind === 'payment' ? `<input type="number" class="date-input" style="width:100px" min="0" step="0.01" placeholder="Amount ₱" value="${t.cost !== null && t.cost !== undefined ? t.cost : ''}" onchange="updateTaskCost('${t.id}', this.value)" title="Total amount for this payment">` : ''}
          <select class="priority-btn priority-select ${effectivePriority(t)}" ${effectivePriority(t) !== t.priority ? 'title="Past due date — showing as Overdue"' : ''} onchange="updateTaskPriority('${t.id}', this.value)">${priorityOptionsHtml(effectivePriority(t))}</select>
          <input type="date" class="date-input" value="${t.date || ''}" onchange="updateTaskDate('${t.id}', this.value)" title="Due date">
          <button class="delete-btn" onclick="duplicateTask('${t.id}')" title="Duplicate task">⧉</button>
          <button class="delete-btn" onclick="deleteTask('${t.id}')" title="Delete task">✕</button>
        </div>
      </div>
      <div class="task-notes-area ${t.notes ? 'open' : ''}" id="notes-area-${t.id}">
        <textarea class="task-notes" placeholder="Notes, links, context for this item…" rows="2"
          oninput="autoResize(this); updateField('${t.id}','notes',this.value)"
          onblur="saveAndRender()">${escHtml(t.notes || '')}</textarea>
      </div>
      <div class="task-link-area ${t.link ? 'open' : ''}" id="link-area-${t.id}">
        <div style="display:flex;gap:6px;align-items:center">
          <input type="url" class="task-link-input" placeholder="https://…" value="${escHtml(t.link || '')}"
            oninput="updateField('${t.id}','link',this.value)"
            onblur="saveAndRender()">
          <button class="delete-btn" style="opacity:1;flex-shrink:0" onclick="clearTaskLink('${t.id}')" title="Remove link">✕</button>
        </div>
      </div>
    </div>`;
}

// ── CALENDAR ───────────────────────────────────────────────────────────────────

function allTasksFlat() {
  const arr = [];
  DESKS.forEach(d => { (state.desks[d.id] || []).forEach(t => { arr.push({t, d}); }); });
  return arr;
}

function fmtDate(dt) {
  const y = dt.getFullYear(), m = String(dt.getMonth()+1).padStart(2,'0'), d = String(dt.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

// "2026-07-14" -> "Jul 14" (or "Jul 14, 2025" if not this year).
function fmtDisplayDate(isoDate) {
  const d = new Date(isoDate + 'T00:00:00');
  const now = new Date();
  const base = `${MONTH_NAMES[d.getMonth()].slice(0,3)} ${d.getDate()}`;
  return d.getFullYear() === now.getFullYear() ? base : `${base}, ${d.getFullYear()}`;
}

// Open tasks sitting untouched this long are flagged as stale — a nudge to
// either act on them or consciously deprioritize/delete them.
const STALE_DAYS = 14;
function daysSince(isoDate) {
  if (!isoDate) return 0;
  const then = new Date(isoDate + 'T00:00:00');
  const now = new Date(fmtDate(new Date()) + 'T00:00:00');
  return Math.round((now - then) / 86400000);
}
function isStale(t) {
  return !t.done && !!t.createdAt && daysSince(t.createdAt) >= STALE_DAYS;
}

function eventsForDate(dateStr) {
  const evs = [];
  allTasksFlat().forEach(({t, d}) => {
    if (t.date === dateStr) evs.push({ type:'task', id:t.id, title:t.title, deskIcon:d.icon, deskBg:d.ic_bg, deskColor:d.ic_color, priority:effectivePriority(t), done:t.done, kind:t.kind, cost:t.cost });
  });
  (state.meetings || []).forEach(m => {
    if (m.date === dateStr) evs.push({ type:'meeting', id:m.id, title:m.title, time:m.time });
  });
  return evs;
}

function deskChipStyle(bg, color) {
  return `background:${bg};color:${color};border-color:${color}`;
}

function renderCalendarMain() {
  const monthNames = MONTH_NAMES;
  const first = new Date(calYear, calMonth, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const todayStr = fmtDate(new Date());

  let cells = '';
  for (let i=0; i<startDow; i++) cells += `<div class="cal-cell empty"></div>`;
  for (let day=1; day<=daysInMonth; day++) {
    const dateStr = fmtDate(new Date(calYear, calMonth, day));
    const evs = eventsForDate(dateStr);
    cells += `
      <div class="cal-cell ${dateStr===todayStr?'today':''}" ondragover="event.preventDefault()" ondrop="handleCalDrop(event,'${dateStr}')">
        <div class="cal-daynum">${day}</div>
        <div class="cal-chips">
          ${evs.map(e => e.type==='task'
            ? `<div class="cal-chip task ${e.done ? 'done' : ''}" style="${deskChipStyle(e.deskBg, e.deskColor)}" ${e.done ? '' : `draggable="true" ondragstart="dragStart(event,'task','${e.id}')"`} title="${escHtml(e.title)}"><span>${e.deskIcon} ${e.kind === 'payment' && e.cost ? fmtCost(e.cost) + ' · ' : ''}${escHtml(e.title)}</span></div>`
            : `<div class="cal-chip meeting" draggable="true" ondragstart="dragStart(event,'meeting','${e.id}')" title="${escHtml(e.title)}"><span>🕐 ${e.time ? e.time + ' · ' : ''}${escHtml(e.title)}</span><span class="chip-del" onclick="event.stopPropagation();deleteMeeting('${e.id}')">✕</span></div>`
          ).join('')}
        </div>
      </div>`;
  }

  const unscheduled = allTasksFlat().filter(({t}) => !t.done && !t.date);

  let html = `
    <div class="desk-header">
      <div class="desk-title-area">
        <div class="desk-title">🗓️ Calendar</div>
        <div class="desk-desc">Drag any task or meeting onto a date to schedule or reschedule it.</div>
      </div>
      <div class="desk-actions">
        <button class="btn" onclick="shiftMonth(-1)">‹ Prev</button>
        <div style="font-size:13px;font-weight:600;padding:0 6px;display:flex;align-items:center;min-width:130px;justify-content:center">${monthNames[calMonth]} ${calYear}</div>
        <button class="btn" onclick="shiftMonth(1)">Next ›</button>
      </div>
    </div>

    <div class="section-divider">
      <span class="section-divider-label">Add a meeting</span>
      <div class="section-divider-line"></div>
    </div>
    <div class="add-task-area" style="cursor:default">
      <input class="add-input" id="mtg-title" placeholder="Meeting title…" style="flex:2">
      <input type="date" class="date-input" id="mtg-date" value="${fmtDate(new Date(calYear, calMonth, Math.min(new Date().getDate(), daysInMonth)))}">
      <input type="time" class="date-input" id="mtg-time">
      <button class="btn btn-primary" onclick="addMeeting()">Add</button>
      <button class="btn" onclick="openMeetingsBulkAddModal()">＋ Bulk add</button>
    </div>

    <div class="section-divider">
      <span class="section-divider-label">Unscheduled tasks — drag onto a date</span>
      <div class="section-divider-line"></div>
    </div>
    <div class="unscheduled-tray">
      ${unscheduled.length === 0
        ? `<span style="font-size:12px;color:var(--muted)">Everything's scheduled.</span>`
        : unscheduled.map(({t,d}) => `<div class="cal-chip task" style="${deskChipStyle(d.ic_bg, d.ic_color)}" draggable="true" ondragstart="dragStart(event,'task','${t.id}')" title="${escHtml(t.title)}"><span>${d.icon} ${t.kind === 'payment' && t.cost ? fmtCost(t.cost) + ' · ' : ''}${escHtml(t.title)}</span></div>`).join('')}
    </div>

    <div class="cal-scroll">
      <div class="cal-dow">
        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
      </div>
      <div class="cal-grid">${cells}</div>
    </div>
  `;

  document.getElementById('main-content').innerHTML = html;
}

function shiftMonth(delta) {
  calMonth += delta;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendarMain();
}

function dragStart(ev, type, id) {
  ev.dataTransfer.setData('text/plain', JSON.stringify({type, id}));
}

function handleCalDrop(ev, dateStr) {
  ev.preventDefault();
  let data;
  try { data = JSON.parse(ev.dataTransfer.getData('text/plain')); } catch(e) { return; }
  if (data.type === 'task') {
    const t = findTask(data.id);
    if (t) { t.date = dateStr; saveState(); }
  } else if (data.type === 'meeting') {
    const m = (state.meetings || []).find(m => m.id === data.id);
    if (m) { m.date = dateStr; saveState(); }
  }
  // Rescheduling a task can flip its effective priority (e.g. onto/off a
  // past date), which the top KPI strip and sidebar badges need to reflect.
  computeKpis();
  renderNav();
  renderCalendarMain();
}

function addMeeting() {
  const title = document.getElementById('mtg-title').value.trim();
  const date = document.getElementById('mtg-date').value;
  const time = document.getElementById('mtg-time').value;
  if (!title || !date) return;
  if (!state.meetings) state.meetings = [];
  state.meetings.push({ id:'mtg_' + Date.now(), title, date, time });
  saveState();
  renderCalendarMain();
}

function deleteMeeting(id) {
  state.meetings = (state.meetings || []).filter(m => m.id !== id);
  saveState();
  renderCalendarMain();
}

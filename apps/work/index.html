function bulkAddMeetingsFromPaste() {
  const ta = document.getElementById('bulk-mtg-text');
  const lines = ta.value.split('\n').map(l => l.trim()).filter(Boolean);
  if (!lines.length) return;
  if (!state.meetings) state.meetings = [];
  let added = 0;
  lines.forEach(line => {
    const parts = line.includes('\t') ? line.split('\t') : line.split(',');
    const title = (parts[0] || '').trim();
    const date = parts[1] !== undefined ? parseFlexibleDate(parts[1]) : '';
    if (!title || !date) return;
    const time = (parts[2] || '').trim();
    state.meetings.push({ id: 'mtg_' + Date.now() + '_' + added, title, date, time });
    added++;
  });
  if (!added) return;
  saveState();
  closeModal();
  renderCalendarMain();
}

function bulkAddMeetingsRepeating() {
  const title = document.getElementById('bulk-mtg-rep-title').value.trim();
  const startVal = document.getElementById('bulk-mtg-rep-start').value;
  if (!title || !startVal) return;
  const time = document.getElementById('bulk-mtg-rep-time').value;
  const everyDays = parseInt(document.getElementById('bulk-mtg-rep-every').value, 10) || 7;
  const count = Math.max(1, Math.min(52, parseInt(document.getElementById('bulk-mtg-rep-count').value, 10) || 1));
  const start = new Date(startVal + 'T00:00:00');
  if (!state.meetings) state.meetings = [];
  for (let i = 0; i < count; i++) {
    const d = new Date(start);
    d.setDate(d.getDate() + everyDays * i);
    state.meetings.push({ id: 'mtg_' + Date.now() + '_' + i, title, date: fmtDate(d), time });
  }
  saveState();
  closeModal();
  renderCalendarMain();
}

// ── NOTES (DAILY LOG) ────────────────────────────────────────────────────────

// Notes are independent entries (their own id), not one-per-date, so a day
// can hold several entries for different specific tasks/topics. `date` is
// only used for grouping/sorting in the outline.
function findNote(id) {
  return (state.notes || []).find(n => n.id === id);
}

function allNotesSorted() {
  return (state.notes || []).slice().sort((a, b) => {
    if (a.date !== b.date) return b.date.localeCompare(a.date);
    return (b.createdAt || '').localeCompare(a.createdAt || '');
  });
}

function createNote(dateStr) {
  const n = {
    id: 'note_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
    date: dateStr, title: '', html: '', tags: [],
    createdAt: new Date().toISOString(),
  };
  if (!state.notes) state.notes = [];
  state.notes.push(n);
  return n;
}

// Persists whatever's in the editor for the entry we're about to navigate
// away from. Needed because the nav buttons live outside .notes-editor, so
// clicking them (while the editable has focus) fires a real blur — and if
// that blur handler ran its usual full re-render, it would destroy the very
// button being clicked mid-click. These buttons use onmousedown
// preventDefault to avoid that blur entirely, so save explicitly instead.
function finalizeCurrentNote() {
  const el = document.getElementById('notes-editable');
  if (el && currentNoteId) updateNoteHtml(currentNoteId, sanitizeNoteHtml(el.innerHTML));
}

function createNewNote() {
  finalizeCurrentNote();
  const n = createNote(fmtDate(new Date()));
  currentNoteId = n.id;
  renderNotesMain();
}

function updateNoteTitle(id, val) {
  const n = findNote(id);
  if (!n) return;
  n.title = val;
  n.updatedAt = new Date().toISOString();
  saveState();
  markNotesDirty();
}

// Notes created before rich-text formatting only have a plain-text `text`
// field. Render those through here too so old entries still display.
function noteBodyHtml(n) {
  if (!n) return '';
  if (n.html !== undefined) return n.html;
  if (n.text) return n.text.split('\n').map(line => `<div>${escHtml(line)}</div>`).join('');
  return '';
}

function htmlToPlainText(html) {
  const doc = new DOMParser().parseFromString(html || '', 'text/html');
  return (doc.body.textContent || '').replace(/\s+/g, ' ').trim();
}

// Allowlist sanitizer for note HTML — needed because notes moved from plain
// text to rich text, so pasted content (which can carry arbitrary markup,
// including event-handler attributes) must be stripped before it's saved
// and later re-rendered via innerHTML.
const NOTE_ALLOWED_TAGS = new Set(['B','I','U','S','STRONG','EM','DIV','SPAN','P','BR','UL','OL','LI','FONT']);
const NOTE_STRIP_ENTIRELY_TAGS = new Set(['SCRIPT','STYLE','IFRAME','OBJECT','EMBED','NOSCRIPT']);
const NOTE_ALLOWED_STYLE_PROPS = new Set(['color','background-color','font-family','font-size','font-weight','font-style','text-decoration','text-align']);
const NOTE_FONT_SIZE_MAP = { '1':'10px','2':'12px','3':'14px','4':'16px','5':'18px','6':'24px','7':'32px' };

function sanitizeNoteHtml(html) {
  const doc = new DOMParser().parseFromString(html || '', 'text/html');
  sanitizeNoteNode(doc.body);
  return doc.body.innerHTML;
}

function sanitizeNoteNode(node) {
  Array.from(node.childNodes).forEach(child => {
    if (child.nodeType === Node.TEXT_NODE) return;
    if (child.nodeType !== Node.ELEMENT_NODE) { node.removeChild(child); return; }
    if (NOTE_STRIP_ENTIRELY_TAGS.has(child.tagName)) { node.removeChild(child); return; }
    if (!NOTE_ALLOWED_TAGS.has(child.tagName)) {
      while (child.firstChild) node.insertBefore(child.firstChild, child);
      node.removeChild(child);
      return;
    }
    const styleParts = [];
    if (child.tagName === 'FONT') {
      if (child.getAttribute('color')) styleParts.push('color:' + child.getAttribute('color'));
      if (child.getAttribute('face')) styleParts.push('font-family:' + child.getAttribute('face'));
      const size = NOTE_FONT_SIZE_MAP[child.getAttribute('size')];
      if (size) styleParts.push('font-size:' + size);
    }
    const existingStyle = child.getAttribute('style') || '';
    Array.from(child.attributes).forEach(attr => child.removeAttribute(attr.name));
    const safeDecls = existingStyle.split(';').map(s => s.trim()).filter(Boolean).filter(decl => {
      const prop = decl.split(':')[0].trim().toLowerCase();
      return NOTE_ALLOWED_STYLE_PROPS.has(prop);
    }).concat(styleParts);
    if (safeDecls.length) child.setAttribute('style', safeDecls.join('; '));
    sanitizeNoteNode(child);
  });
}

function updateNoteHtml(id, html) {
  const n = findNote(id);
  if (!n) return;
  n.html = html;
  n.updatedAt = new Date().toISOString();
  saveState();
}

// Notes autosave under the hood (so nothing is lost), but the user asked for
// a visible signal of whether the current entry has unsaved edits or is
// finished, plus an explicit action to mark it done — markNotesDirty() drives
// the "● Editing…" indicator and saveNoteNow() is the explicit Save button.
let notesDirty = false;

function markNotesDirty() {
  notesDirty = true;
  const label = document.getElementById('notes-saved-label');
  if (label) { label.textContent = '● Editing…'; label.style.color = 'var(--p2-color)'; }
  const btn = document.getElementById('notes-save-btn');
  if (btn) btn.disabled = false;
}

function saveNoteNow() {
  const el = document.getElementById('notes-editable');
  if (el && currentNoteId) updateNoteHtml(currentNoteId, sanitizeNoteHtml(el.innerHTML));
  notesDirty = false;
  renderNotesMain();
}

function onNotesEditableInput() {
  const el = document.getElementById('notes-editable');
  if (el && currentNoteId) updateNoteHtml(currentNoteId, el.innerHTML);
  markNotesDirty();
}

function onNotesEditableBlur(ev) {
  // Moving focus anywhere else inside the note editor (the title field, a
  // tag, a toolbar control) also blurs the editable div. Rebuilding the
  // whole view here would destroy whatever the user just clicked into
  // mid-click, so only finalize when focus is actually leaving the editor —
  // e.g. switching desks/views, which re-render from saved state anyway.
  //
  // relatedTarget is also null when this element itself is torn out of the
  // DOM programmatically (e.g. our own re-render, mid-way through replacing
  // #main-content, fires a synchronous blur on the outgoing node). Treating
  // that like "focus left the editor" would save the *stale* pre-rebuild DOM
  // content under whatever currentNoteId has already been reassigned to by
  // that same re-render — silently overwriting the new entry with the old
  // one's text. Window-losing-focus is the same relatedTarget=null shape;
  // skipping it is fine since oninput already autosaves every keystroke.
  if (!ev || !ev.relatedTarget) return;
  if (ev.relatedTarget.closest && ev.relatedTarget.closest('.notes-editor')) return;
  saveNoteNow();
}

function onNotesPaste(ev) {
  ev.preventDefault();
  const clipboard = ev.clipboardData || window.clipboardData;
  const html = clipboard.getData('text/html');
  const text = clipboard.getData('text/plain');
  const clean = html ? sanitizeNoteHtml(html) : escHtml(text).replace(/\n/g, '<br>');
  document.execCommand('insertHTML', false, clean);
  onNotesEditableInput();
}

function notesBlockAncestor(node) {
  const editable = document.getElementById('notes-editable');
  let el = node.nodeType === Node.TEXT_NODE ? node.parentElement : node;
  while (el && el !== editable && !['DIV','P','LI'].includes(el.tagName)) el = el.parentElement;
  return (el && el !== editable) ? el : editable;
}

// Google Docs-style autoformat: typing "- ", "* ", or "1. " at the start of
// a line converts it into a bullet/numbered list instead of inserting the
// space, so lists don't need the toolbar buttons for the common case.
function onNotesEditableKeydown(ev) {
  if (ev.key !== ' ') return;
  const sel = window.getSelection();
  if (!sel.rangeCount || !sel.getRangeAt(0).collapsed) return;
  const range = sel.getRangeAt(0);
  const block = notesBlockAncestor(range.startContainer);
  const preRange = document.createRange();
  preRange.selectNodeContents(block);
  preRange.setEnd(range.startContainer, range.startOffset);
  const textBefore = preRange.toString();

  const isBullet = /^[-*]$/.test(textBefore);
  const isNumbered = /^\d+\.$/.test(textBefore);
  if (!isBullet && !isNumbered) return;

  ev.preventDefault();
  sel.removeAllRanges();
  sel.addRange(preRange);
  document.execCommand('delete');
  try { document.execCommand('styleWithCSS', false, true); } catch (e) {}
  document.execCommand(isBullet ? 'insertUnorderedList' : 'insertOrderedList');
  onNotesEditableInput();
}

function notesExec(cmd, val) {
  const el = document.getElementById('notes-editable');
  if (!el) return;
  el.focus();
  try { document.execCommand('styleWithCSS', false, true); } catch (e) {}
  document.execCommand(cmd, false, val || null);
  onNotesEditableInput();
  updateNotesToolbarState();
}

function setNoteLineSpacing(id, val) {
  const n = findNote(id);
  if (!n) return;
  n.lineSpacing = val;
  saveState();
  const el = document.getElementById('notes-editable');
  if (el) el.style.lineHeight = val;
}

function setNoteParaSpacing(id, val) {
  const n = findNote(id);
  if (!n) return;
  n.paraSpacing = val;
  saveState();
  const editor = document.querySelector('.notes-editor');
  if (editor) editor.style.setProperty('--p-space', val + 'px');
}

const NOTES_TOOLBAR_COMMANDS = ['bold','italic','underline','strikeThrough','justifyLeft','justifyCenter','justifyRight','insertUnorderedList','insertOrderedList'];

function updateNotesToolbarState() {
  const el = document.getElementById('notes-editable');
  if (!el) return;
  const sel = window.getSelection();
  const inside = !!(sel && sel.anchorNode && el.contains(sel.anchorNode));
  NOTES_TOOLBAR_COMMANDS.forEach(cmd => {
    const btn = document.querySelector('.notes-toolbar .tb-btn[data-cmd="' + cmd + '"]');
    if (!btn) return;
    let active = false;
    if (inside) { try { active = document.queryCommandState(cmd); } catch (e) {} }
    btn.classList.toggle('active', active);
  });
}

function toggleNoteTag(id, deskId) {
  const n = findNote(id);
  if (!n) return;
  const i = n.tags.indexOf(deskId);
  if (i === -1) n.tags.push(deskId); else n.tags.splice(i, 1);
  n.updatedAt = new Date().toISOString();
  saveState();
  renderNotesMain();
}

function deleteNote(id) {
  showConfirmModal('Delete this log entry? This cannot be undone.', () => {
    state.notes = (state.notes || []).filter(n => n.id !== id);
    if (currentNoteId === id) currentNoteId = null;
    saveState();
    renderNotesMain();
  });
}

function switchToNote(id) {
  finalizeCurrentNote();
  currentNoteId = id;
  renderNotesMain();
}

function shiftNoteEntry(delta) {
  finalizeCurrentNote();
  const list = allNotesSorted(); // newest first
  if (list.length === 0) return;
  const idx = list.findIndex(n => n.id === currentNoteId);
  const newIdx = idx === -1
    ? (delta > 0 ? 0 : list.length - 1)
    : Math.min(Math.max(idx - delta, 0), list.length - 1);
  currentNoteId = list[newIdx].id;
  renderNotesMain();
}

function setNotesFilter(el, deskId) {
  notesFilterDesk = deskId;
  document.querySelectorAll('.notes-outline-filter .notes-tag').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  renderNotesOutlineList();
}

function setNotesSearch(val) {
  notesSearchQuery = val.toLowerCase();
  renderNotesOutlineList();
}

function notesOutlineSource() {
  return allNotesSorted().filter(n =>
    n.id === currentNoteId || n.title || htmlToPlainText(noteBodyHtml(n)) || (n.tags && n.tags.length));
}

function renderNotesOutlineList() {
  const container = document.getElementById('notes-outline-list');
  if (!container) return;

  let list = notesOutlineSource();
  if (notesFilterDesk) list = list.filter(n => (n.tags || []).includes(notesFilterDesk));
  if (notesSearchQuery) list = list.filter(n => (n.title || '').toLowerCase().includes(notesSearchQuery) || htmlToPlainText(noteBodyHtml(n)).toLowerCase().includes(notesSearchQuery) || n.date.includes(notesSearchQuery));

  if (list.length === 0) {
    container.innerHTML = `<div class="notes-outline-empty">No entries match.</div>`;
    return;
  }

  const monthNames = MONTH_NAMES;
  let html = '';
  let lastMonthKey = null;

  list.forEach(n => {
    const d = new Date(n.date + 'T00:00:00');
    const monthKey = n.date.slice(0, 7);
    if (monthKey !== lastMonthKey) {
      html += `<div class="notes-outline-month">${monthNames[d.getMonth()]} ${d.getFullYear()}</div>`;
      lastMonthKey = monthKey;
    }
    const plain = n.title || htmlToPlainText(noteBodyHtml(n));
    const snippet = plain ? plain.slice(0, 40) : '(empty)';
    const tagDots = (n.tags || []).map(id => {
      const desk = DESKS.find(x => x.id === id);
      return desk ? `<span class="tag-dot" style="background:${desk.ic_color}"></span>` : '';
    }).join('');
    html += `
      <button class="notes-outline-item ${n.id === currentNoteId ? 'active' : ''}" onmousedown="event.preventDefault()" onclick="switchToNote('${n.id}')">
        <span class="notes-outline-dot"></span>
        <span class="notes-outline-snippet"><b>${DOW_NAMES[d.getDay()].slice(0,3)} ${d.getDate()}</b>${snippet !== '(empty)' ? ' — ' + escHtml(snippet) : ''}</span>
        <span class="notes-outline-tags">${tagDots}</span>
      </button>`;
  });

  container.innerHTML = html;
}

// ── DOCUMENT LINKS ─────────────────────────────────────────────────────────────

function linkIcon(cat) {
  const map = { Sheets:'📊', Docs:'📄', Slides:'📽️', Drive:'📁', Other:'🔗' };
  return map[cat] || '🔗';
}

let linksFilterCat = '';
let linksSearchQuery = '';

function setLinksFilter(val) {
  linksFilterCat = val;
  renderLinksMain();
}

function setLinksSearch(val) {
  linksSearchQuery = val.toLowerCase();
  renderLinksMain();
}

const LINK_CATS = ['Sheets', 'Docs', 'Slides', 'Drive', 'Other'];
function linkCatLabel(cat) { return cat === 'Drive' ? 'Drive folder' : cat; }
function linkCatOptionsHtml(current) {
  return LINK_CATS.map(c => `<option value="${c}" ${c === current ? 'selected' : ''}>${linkCatLabel(c)}</option>`).join('');
}

let editingLinkId = null;

function renderLinksMain() {
  const allLinks = state.docLinks || [];
  let links = allLinks;
  if (linksFilterCat) links = links.filter(l => (l.cat || 'Other') === linksFilterCat);
  if (linksSearchQuery) links = links.filter(l => l.label.toLowerCase().includes(linksSearchQuery) || l.url.toLowerCase().includes(linksSearchQuery));

  let html = `
    <div class="desk-header">
      <div class="desk-title-area">
        <div class="desk-title">🔗 Document links</div>
        <div class="desk-desc">Your directory of Google Docs, Sheets, Slides, and Drive folders.</div>
      </div>
      <div class="desk-actions">
        <input class="add-input" placeholder="🔍 Search links…" style="width:160px" value="${escHtml(linksSearchQuery)}" oninput="setLinksSearch(this.value)">
        <select class="add-priority-select" onchange="setLinksFilter(this.value)">
          <option value="" ${!linksFilterCat ? 'selected' : ''}>All categories</option>
          ${LINK_CATS.map(c => `<option value="${c}" ${linksFilterCat === c ? 'selected' : ''}>${linkCatLabel(c)}</option>`).join('')}
        </select>
        <button class="btn" onclick="openLinksBulkAddModal()">＋ Bulk add</button>
      </div>
    </div>
    <div class="add-task-area" style="cursor:default">
      <input class="add-input" id="link-label" placeholder="Label (e.g. July P&amp;L — Branch 3)" style="flex:2">
      <input class="add-input" id="link-url" placeholder="https://docs.google.com/…" style="flex:2">
      <select class="add-priority-select" id="link-cat">${linkCatOptionsHtml('Sheets')}</select>
      <button class="btn btn-primary" onclick="addLink()">Add</button>
    </div>
    <div class="tasks-list">`;

  if (allLinks.length === 0) {
    html += `<div class="empty-state"><div class="empty-icon">🔗</div><div class="empty-text">No links yet — add a Google Doc, Sheet, or Slide URL above.</div></div>`;
  } else if (links.length === 0) {
    html += `<div class="empty-state"><div class="empty-icon">🔗</div><div class="empty-text">No links match this filter.</div></div>`;
  } else {
    links.forEach(l => {
      if (editingLinkId === l.id) {
        html += `
          <div class="task-card p4">
            <div class="task-main">
              <div class="link-icon">${linkIcon(l.cat)}</div>
              <div class="task-body" style="display:flex;flex-direction:column;gap:6px">
                <input class="add-input" id="edit-link-label-${l.id}" value="${escHtml(l.label)}" placeholder="Label">
                <input class="add-input" id="edit-link-url-${l.id}" type="url" value="${escHtml(l.url)}" placeholder="https://…">
                <select class="add-priority-select" id="edit-link-cat-${l.id}" style="align-self:flex-start">${linkCatOptionsHtml(l.cat || 'Other')}</select>
              </div>
              <div class="task-controls">
                <button class="btn btn-primary" onclick="saveLinkEdit('${l.id}')">Save</button>
                <button class="btn" onclick="cancelLinkEdit()">Cancel</button>
              </div>
            </div>
          </div>`;
      } else {
        html += `
          <div class="task-card p4">
            <div class="task-main">
              <div class="link-icon">${linkIcon(l.cat)}</div>
              <div class="task-body">
                <div class="task-title-row">
                  <span class="task-title-input" style="display:block">${escHtml(l.label)}</span>
                </div>
                <a href="${escHtml(l.url)}" target="_blank" rel="noopener" style="font-size:11px;color:var(--navy-light);word-break:break-all">${escHtml(l.url)}</a>
              </div>
              <div class="task-controls">
                <span class="priority-btn p4">${linkCatLabel(l.cat || 'Other')}</span>
                <button class="delete-btn" style="opacity:1" onclick="toggleLinkEdit('${l.id}')" title="Edit">✎</button>
                <button class="delete-btn" style="opacity:1" onclick="deleteLink('${l.id}')" title="Remove">✕</button>
              </div>
            </div>
          </div>`;
      }
    });
  }

  html += `</div>`;
  document.getElementById('main-content').innerHTML = html;
}

function addLink() {
  const label = document.getElementById('link-label').value.trim();
  const url = document.getElementById('link-url').value.trim();
  const cat = document.getElementById('link-cat').value;
  if (!label || !url) return;
  if (!state.docLinks) state.docLinks = [];
  state.docLinks.push({ id:'link_' + Date.now(), label, url, cat });
  saveState();
  renderLinksMain();
}

function openLinksBulkAddModal() {
  const html = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal-panel" style="max-width:520px">
        <div class="modal-header">
          <div class="modal-title">Bulk add — 🔗 Document links</div>
          <button class="delete-btn" style="opacity:1" onclick="closeModal()">✕</button>
        </div>
        <div style="padding:14px 18px 18px">
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px">One entry per line: Label, URL, Category (tab or comma separated). Category is optional and defaults to Other — valid ones are ${LINK_CATS.join(', ')}.</div>
          <textarea id="bulk-links-text" rows="6" style="width:100%;box-sizing:border-box;font-family:inherit;font-size:12px;padding:8px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text)" placeholder="July P&amp;L — Branch 3, https://docs.google.com/…, Sheets"></textarea>
          <div style="display:flex;justify-content:flex-end;margin-top:10px">
            <button class="btn btn-primary" onclick="bulkAddLinksFromPaste()">＋ Add pasted rows</button>
          </div>
        </div>
      </div>
    </div>`;
  document.getElementById('modal-root').innerHTML = html;
}

function bulkAddLinksFromPaste() {
  const ta = document.getElementById('bulk-links-text');
  const lines = ta.value.split('\n').map(l => l.trim()).filter(Boolean);
  if (!lines.length) return;
  if (!state.docLinks) state.docLinks = [];
  let added = 0;
  lines.forEach(line => {
    const parts = line.includes('\t') ? line.split('\t') : line.split(',');
    const label = (parts[0] || '').trim();
    const url = (parts[1] || '').trim();
    if (!label || !url) return;
    let cat = (parts[2] || '').trim();
    if (!LINK_CATS.includes(cat)) cat = 'Other';
    state.docLinks.push({ id: 'link_' + Date.now() + '_' + added, label, url, cat });
    added++;
  });
  if (!added) return;
  saveState();
  closeModal();
  renderLinksMain();
}

function toggleLinkEdit(id) {
  editingLinkId = editingLinkId === id ? null : id;
  renderLinksMain();
}

function cancelLinkEdit() {
  editingLinkId = null;
  renderLinksMain();
}

function saveLinkEdit(id) {
  const l = (state.docLinks || []).find(l => l.id === id);
  if (!l) return;
  const label = document.getElementById('edit-link-label-' + id).value.trim();
  const url = document.getElementById('edit-link-url-' + id).value.trim();
  const cat = document.getElementById('edit-link-cat-' + id).value;
  if (!label || !url) return;
  l.label = label; l.url = url; l.cat = cat;
  saveState();
  editingLinkId = null;
  renderLinksMain();
}

function deleteLink(id) {
  state.docLinks = (state.docLinks || []).filter(l => l.id !== id);
  if (editingLinkId === id) editingLinkId = null;
  saveState();
  renderLinksMain();
}

// ── TASK ACTIONS ───────────────────────────────────────────────────────────────

function findTask(id) {
  for (const d of DESKS) {
    const t = (state.desks[d.id] || []).find(t => t.id === id);
    if (t) return t;
  }
  return null;
}

function toggleDone(id) {
  const t = findTask(id);
  if (t) {
    t.done = !t.done;
    t.status = t.done ? 'done' : (t.status === 'done' ? 'not-started' : t.status);
    t.completedAt = t.done ? fmtDate(new Date()) : null;
    saveState(); renderAll();
  }
}

function updateTaskPriority(id, priority) {
  const t = findTask(id);
  if (t) { t.priority = priority; saveState(); renderAll(); }
}

function updateTaskKind(id, kind) {
  const t = findTask(id);
  if (t) { t.kind = kind; saveState(); renderAll(); }
}

function updateTaskCost(id, val) {
  const t = findTask(id);
  if (t) { const n = parseFloat(val); t.cost = isNaN(n) ? null : n; saveState(); renderAll(); }
}

function cycleStatus(id) {
  const t = findTask(id);
  if (t) {
    t.status = STATUS_CYCLE[t.status] || 'not-started';
    if (t.status === 'done') { t.done = true; t.completedAt = fmtDate(new Date()); }
    else if (t.done) { t.done = false; t.completedAt = null; }
    saveState(); renderAll();
  }
}

function updateTaskDate(id, val) {
  const t = findTask(id);
  // A due date can flip effectivePriority (e.g. into/out of Overdue), which
  // moves the task's section, its card color, and the top KPI counts — so
  // this needs the full re-render, not just a save.
  if (t) { t.date = val; saveState(); renderAll(); }
}

function updateField(id, field, val) {
  const t = findTask(id);
  if (t) { t[field] = val; saveState(); }
}

function deleteTask(id) {
  for (const d of DESKS) {
    const idx = (state.desks[d.id] || []).findIndex(t => t.id === id);
    if (idx !== -1) { state.desks[d.id].splice(idx, 1); saveState(); renderAll(); return; }
  }
}

// Copies title/meta/priority/link but not the date — the copy lands in
// "Unscheduled tasks" so it can be dragged onto whichever day it's needed,
// which is the point for placing a routine/recurring task on a specific day
// without retyping it each time.
function duplicateTask(id) {
  for (const d of DESKS) {
    const list = state.desks[d.id] || [];
    const idx = list.findIndex(t => t.id === id);
    if (idx === -1) continue;
    const src = list[idx];
    const copy = {
      ...src,
      id: d.id + '_' + Date.now(),
      done: false,
      status: 'not-started',
      date: '',
      completedAt: null,
      createdAt: fmtDate(new Date()),
    };
    list.splice(idx + 1, 0, copy);
    saveState(); renderAll();
    return;
  }
}

function toggleNotes(id) {
  const area = document.getElementById('notes-area-' + id);
  if (area) {
    area.classList.toggle('open');
    const ta = area.querySelector('.task-notes');
    if (ta && area.classList.contains('open')) { ta.focus(); autoResize(ta); }
  }
}

function clearTaskLink(id) {
  const t = findTask(id);
  if (t) { t.link = ''; saveState(); renderAll(); }
}

function toggleLink(id) {
  const area = document.getElementById('link-area-' + id);
  if (area) {
    area.classList.toggle('open');
    const input = area.querySelector('.task-link-input');

function addTask(deskId) {

  const kindSel = document.getElementById('add-kind-' + deskId);
  const costInput = document.getElementById('add-cost-' + deskId);
  const title = input.value.trim();
  if (!title) { input.focus(); return; }
  const costVal = costInput ? parseFloat(costInput.value) : NaN;
  const newTask = normalizeTask({
    id: deskId + '_' + Date.now(),
    title,
    meta: '',
    priority: priSel ? priSel.value : 'p2',
    done: false,
    notes: '',
    date: '',
    status: 'not-started',
    link: linkInput ? linkInput.value.trim() : '',
    kind: kindSel ? kindSel.value : 'task',
    cost: isNaN(costVal) ? null : costVal,
  });
  if (!state.desks[deskId]) state.desks[deskId] = [];
  state.desks[deskId].unshift(newTask);
  saveState();

  if (costInput) costInput.value = '';
  if (linkInput) linkInput.value = '';
  renderAll();
}

// Accepts "M/D/YYYY", "YYYY-MM-DD", or anything Date can parse; returns '' if unparseable.
function parseFlexibleDate(s) {
  s = (s || '').trim();
  if (!s) return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const mdy = /^(\d{1,2})\/(\d{1,2})\/(\d{4})$/.exec(s);
  if (mdy) {
    const [, m, d, y] = mdy;
    return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
  }
  const dt = new Date(s);
  return isNaN(dt.getTime()) ? '' : fmtDate(dt);
}

function parseBulkLine(line) {
  const parts = line.includes('\t') ? line.split('\t') : line.split(',');
  const title = (parts[0] || '').trim();
  let cost = null;
  if (parts[1] !== undefined && parts[1].trim() !== '') {
    const n = parseFloat(String(parts[1]).replace(/[^\d.\-]/g, ''));
    cost = isNaN(n) ? null : n;
  }
  const date = parts[2] !== undefined ? parseFlexibleDate(parts[2]) : '';
  return { title, cost, date };
}

function bulkAddFromPaste(deskId) {
  const ta = document.getElementById('bulk-paste-text');
  const kindSel = document.getElementById('bulk-paste-kind');
  const lines = ta.value.split('\n').map(l => l.trim()).filter(Boolean);
  if (!lines.length) return;
  if (!state.desks[deskId]) state.desks[deskId] = [];
  let added = 0;
  lines.forEach(line => {
    const { title, cost, date } = parseBulkLine(line);
    if (!title) return;
    state.desks[deskId].unshift(normalizeTask({
      id: deskId + '_' + Date.now() + '_' + added,
      title, meta: '', priority: 'p2', done: false, notes: '', date, status: 'not-started', link: '',
      kind: kindSel ? kindSel.value : 'task', cost,
    }));
    added++;
  });
  if (!added) return;
  saveState();
  closeModal();
  renderAll();
}

function bulkAddRepeating(deskId) {
  const title = document.getElementById('bulk-rep-title').value.trim();
  const startVal = document.getElementById('bulk-rep-start').value;
  if (!title || !startVal) return;
  const costEl = document.getElementById('bulk-rep-cost');
  const costVal = costEl ? parseFloat(costEl.value) : NaN;
  const everyDays = parseInt(document.getElementById('bulk-rep-every').value, 10) || 7;
  const count = Math.max(1, Math.min(52, parseInt(document.getElementById('bulk-rep-count').value, 10) || 1));
  const kindSel = document.getElementById('bulk-rep-kind');
  const start = new Date(startVal + 'T00:00:00');

  if (!state.desks[deskId]) state.desks[deskId] = [];
  for (let i = 0; i < count; i++) {
    const d = new Date(start);
    d.setDate(d.getDate() + everyDays * i);
    state.desks[deskId].unshift(normalizeTask({
      id: deskId + '_' + Date.now() + '_' + i,
      title, meta: '', priority: 'p2', done: false, notes: '', date: fmtDate(d), status: 'not-started', link: '',
      kind: kindSel ? kindSel.value : 'task', cost: isNaN(costVal) ? null : costVal,
    }));
  }
  saveState();
  closeModal();
  renderAll();
}

  saveState();
  computeKpis();
  renderNav();
}

// ── CLOUD SYNC ─────────────────────────────────────────────────────────────────

let dashboardPin = localStorage.getItem('qualitech_pin') || '';
let cloudAvailable = false;
let syncTimer = null;

function setSyncStatus(mode) {
  const el = document.getElementById('sync-status-text');
  const btn = document.getElementById('sync-action-btn');
  if (!el) return;
  const map = {
    off:        { text: '☁ Cloud sync: off',            btnText: 'Connect' },
    connecting: { text: '☁ Connecting…',                 btnText: 'Connect' },
    saving:     { text: '☁ Saving…',                     btnText: 'Disconnect' },
    synced:     { text: '☁ Synced',                      btnText: 'Disconnect' },
    error:      { text: '⚠ Sync error — saved locally',  btnText: 'Retry' },
  };
  const m = map[mode] || map.off;
  el.textContent = m.text;
  if (btn) btn.textContent = m.btnText;
}

function openSyncModal() {
  if (cloudAvailable) {
    showConfirmModal("Disconnect cloud sync on this device? Your data stays saved locally, it just won't push to the cloud anymore.", disconnectSync, { danger: false, confirmLabel: 'Disconnect' });
    return;
  }
  const html = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal-panel" style="max-width:360px">
        <div class="modal-header">
          <div class="modal-title">Connect cloud sync</div>
          <button class="delete-btn" style="opacity:1" onclick="closeModal()">✕</button>
        </div>
        <div style="padding:16px 18px">
          <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Enter the dashboard PIN to sync this desk's data across devices.</div>
          <input type="password" id="sync-pin-input" class="add-input" placeholder="PIN"
            style="border:1px solid var(--border-strong);border-radius:7px;padding:8px 10px;width:100%;margin-bottom:10px"
            onkeydown="if(event.key==='Enter') submitSyncPin()">
          <button class="btn btn-primary" style="width:100%" onclick="submitSyncPin()">Connect</button>
        </div>
      </div>
    </div>`;
  document.getElementById('modal-root').innerHTML = html;
  setTimeout(() => { const inp = document.getElementById('sync-pin-input'); if (inp) inp.focus(); }, 50);
}

function submitSyncPin() {
  const inp = document.getElementById('sync-pin-input');
  const pin = inp ? inp.value.trim() : '';
  if (!pin) return;
  closeModal();
  connectSync(pin, false);
}

async function connectSync(pin, silent) {
  if (!silent) setSyncStatus('connecting');
  try {
    const res = await fetch('/api/state', { headers: { 'x-dashboard-pin': pin } });
    if (res.status === 401) {
      if (!silent) showAlertModal('Incorrect PIN.');
      setSyncStatus('off');
      return;
    }
    if (!res.ok) throw new Error('unreachable');
    const data = await res.json();
    dashboardPin = pin;
    localStorage.setItem('qualitech_pin', pin);
    cloudAvailable = true;

    if (data.state && data.state.desks) {
      DESKS.forEach(d => {
        if (!data.state.desks[d.id]) data.state.desks[d.id] = [];
        data.state.desks[d.id].forEach(normalizeTask);
      });
      if (!data.state.meetings) data.state.meetings = [];
      if (!data.state.docLinks) data.state.docLinks = [];
      if (!data.state.notes) data.state.notes = [];
      if (!data.state.morningCheck) data.state.morningCheck = { date: '', desks: [] };
      if (!data.state.checklistStreak) data.state.checklistStreak = { count: 0, lastDate: '' };
      state = data.state;
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
      renderAll();
    } else {
      // Nothing saved on the server yet — push what's here now as the seed.
      await pushStateToCloud();
    }
    setSyncStatus('synced');
    if (notifActive()) subscribeForPush();
  } catch (e) {
    cloudAvailable = false;
    if (!silent) showAlertModal("Couldn't reach cloud sync. Check that the backend is deployed (see SYNC_SETUP.md) and try again.");
    setSyncStatus('off');
  }
}

function disconnectSync() {
  cloudAvailable = false;
  dashboardPin = '';
  localStorage.removeItem('qualitech_pin');
  setSyncStatus('off');
}

function scheduleCloudSync() {
  if (!cloudAvailable) return;
  clearTimeout(syncTimer);
  setSyncStatus('saving');
  syncTimer = setTimeout(pushStateToCloud, 800);
}

async function pushStateToCloud() {
  try {
    const res = await fetch('/api/state', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-dashboard-pin': dashboardPin },
      body: JSON.stringify({ state }),
    });
    if (!res.ok) throw new Error('sync failed');
    setSyncStatus('synced');
  } catch (e) {
    setSyncStatus('error');
  }
}

// ── BACKUP: EXPORT / IMPORT ───────────────────────────────────────────────────

function exportBackup() {
  const payload = { exportedAt: new Date().toISOString(), version: STORE_KEY, state };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `qualitech-dashboard-backup-${fmtDate(new Date())}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importBackup(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      const incoming = parsed.state || parsed; // accept raw state or a wrapped export
      if (!incoming || !incoming.desks) throw new Error('Not a valid backup file');
      showConfirmModal('Import this backup? It will replace everything currently saved in this browser.', () => {
        if (!incoming.meetings) incoming.meetings = [];
        if (!incoming.docLinks) incoming.docLinks = [];
        if (!incoming.notes) incoming.notes = [];
        if (!incoming.morningCheck) incoming.morningCheck = { date: '', desks: [] };
        if (!incoming.checklistStreak) incoming.checklistStreak = { count: 0, lastDate: '' };
        DESKS.forEach(d => {
          if (!incoming.desks[d.id]) incoming.desks[d.id] = [];
          incoming.desks[d.id].forEach(normalizeTask);
        });
        state = incoming;
        saveState();
        activeView = 'overview';
        renderAll();
        showAlertModal('Backup imported.');
      }, { confirmLabel: 'Import' });
    } catch (e) {
      showAlertModal("Could not read that file — make sure it's a backup exported from this dashboard.");
    }
    ev.target.value = '';
  };
  reader.readAsText(file);
}

// ── PASSCODE LOCK ──────────────────────────────────────────────────────────────
// A 4-digit code the dashboard asks for once per browser session, purely as a
// glance-deterrent on a shared or unlocked device. It's stored in plain text
// in localStorage — it does not encrypt or protect the underlying data, which
// is why "Forgot passcode?" can just clear it without touching state.

const LOCK_KEY = 'qualitech_lock_code';
const UNLOCK_FLAG = 'qualitech_unlocked';
let pendingLockCode = '';

function initLock() {

// ── DESKTOP NOTIFICATIONS ────────────────────────────────────────────────────
// Two layers: the Notification API fires while this tab/PWA is actually
// open (immediate, no setup beyond permission); Web Push (below) fires even
// when it's fully closed, but needs cloud sync connected since the check
// runs server-side against the synced state, not this browser's localStorage.
const NOTIF_KEY = 'qualitech_notif_enabled';
const NOTIF_DIGEST_KEY = 'qualitech_notif_last_digest';
const NOTIF_SEEN_OVERDUE_KEY = 'qualitech_notif_seen_overdue';
const NOTIF_SEEN_MEETING_KEY = 'qualitech_notif_seen_meeting';
const PUSH_VAPID_PUBLIC_KEY = 'BLEeUe5RcmhUP7EYhO1mvAZCUR78ZC7ZXzYcWEBHFebm63TgKRVj9mpE9d_LfLUQmMNtwUsIVOR0LExdw8AmMJ8';

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map((c) => c.charCodeAt(0)));
}

async function subscribeForPush() {
  if (!dashboardPin) return; // background push is checked server-side against synced state
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try {
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(PUSH_VAPID_PUBLIC_KEY),
      });
    }
    await fetch('/api/push-subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-dashboard-pin': dashboardPin },
      body: JSON.stringify({ subscription: sub.toJSON() }),
    });
  } catch (e) {}
}

async function unsubscribeForPush() {
  if (!('serviceWorker' in navigator)) return;
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if (sub) {
      if (dashboardPin) {
        await fetch('/api/push-subscribe', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json', 'x-dashboard-pin': dashboardPin },
          body: JSON.stringify({ subscription: sub.toJSON() }),
        });
      }
      await sub.unsubscribe();
    }
  } catch (e) {}
}

function notifSupported() { return 'Notification' in window; }
function notifActive() {
  return notifSupported() && Notification.permission === 'granted' && localStorage.getItem(NOTIF_KEY) === '1';
}

function sendNotification(title, body, tag) {
  if (!notifActive()) return;
  try {
    const n = new Notification(title, { body, tag, icon: 'icon-192.png' });
    n.onclick = () => { window.focus(); n.close(); };
  } catch (e) {}
}

function toggleNotifications() {
  if (!notifSupported()) {
    showAlertModal("Your browser doesn't support desktop notifications.");
    return;
  }
  if (localStorage.getItem(NOTIF_KEY) === '1') {
    localStorage.setItem(NOTIF_KEY, '0');
    unsubscribeForPush();
    updateNotifStatusUI();
    return;
  }
  Notification.requestPermission().then((perm) => {
    if (perm === 'granted') {
      localStorage.setItem(NOTIF_KEY, '1');
      sendNotification('Notifications on', dashboardPin
        ? "You'll get overdue/due-today alerts here, including when this app is closed."
        : "You'll get alerts while this tab is open. Connect cloud sync (rail footer) to also get them when the app is closed.", 'notif-enabled');
      localStorage.removeItem(NOTIF_DIGEST_KEY);
      maybeSendDailyDigest();
      checkOverdueNudges();
      checkMeetingReminders();
      subscribeForPush();
    } else {
      showAlertModal('Notifications were blocked. Allow them for this site in your browser settings, then try again.');
    }
    updateNotifStatusUI();
  });
}

function updateNotifStatusUI() {
  const row = document.getElementById('notif-status-row');
  if (!row) return;
  const supported = notifSupported();
  const enabled = notifActive();
  const label = !supported ? 'unsupported' : !enabled ? 'off' : dashboardPin ? 'on (works when closed)' : 'on (this tab only)';
  row.innerHTML = `
    <span style="font-size:11px;color:var(--muted)">🔔 Alerts: ${label}</span>
    <button class="btn" style="font-size:11px;padding:4px 8px" onclick="toggleNotifications()" ${supported ? '' : 'disabled'}>${enabled ? 'Turn off' : 'Turn on'}</button>`;
}

// One digest per calendar day, only sent if there's actually something to
// flag — nothing to report shouldn't be worth a notification.
function maybeSendDailyDigest() {
  if (!notifActive()) return;
  const today = fmtDate(new Date());
  if (localStorage.getItem(NOTIF_DIGEST_KEY) === today) return;
  let overdue = 0, dueToday = 0;
  allTasksFlat().forEach(({t}) => {
    if (t.done) return;
    if (effectivePriority(t) === 'p1') overdue++;
    else if (t.date === today) dueToday++;
  });
  if (overdue > 0 || dueToday > 0) {
    const parts = [];
    if (overdue > 0) parts.push(`${overdue} overdue`);
    if (dueToday > 0) parts.push(`${dueToday} due today`);
    sendNotification('Morning check-in', parts.join(' · '), 'daily-digest');
  }
  localStorage.setItem(NOTIF_DIGEST_KEY, today);
}

// Nudges once per task the moment it becomes overdue, not on every check —
// tasks drop out of the "seen" set as soon as they're no longer overdue
// (done, or the date moves), so a task can re-nudge if it slips again later.
function checkOverdueNudges() {
  if (!notifActive()) return;
  let seen;
  try { seen = new Set(JSON.parse(localStorage.getItem(NOTIF_SEEN_OVERDUE_KEY) || '[]')); }
  catch (e) { seen = new Set(); }
  const stillOverdue = new Set();
  allTasksFlat().forEach(({t, d}) => {
    if (t.done || effectivePriority(t) !== 'p1') return;
    stillOverdue.add(t.id);
    if (!seen.has(t.id)) sendNotification(`Overdue · ${d.name}`, t.title, 'overdue-' + t.id);
  });
  localStorage.setItem(NOTIF_SEEN_OVERDUE_KEY, JSON.stringify([...stillOverdue]));
}

// Nudges once per meeting when it's starting within 15 minutes (and not
// more than 5 minutes past start, in case a check gets missed) — same
// once-per-check-cycle "seen" pattern as overdue nudges above.
function checkMeetingReminders() {
  if (!notifActive()) return;
  let seen;
  try { seen = new Set(JSON.parse(localStorage.getItem(NOTIF_SEEN_MEETING_KEY) || '[]')); }
  catch (e) { seen = new Set(); }
  const now = new Date();
  const todayStr = fmtDate(now);
  const nowMinutes = now.getHours() * 60 + now.getMinutes();
  const stillPending = new Set();
  (state.meetings || []).forEach(m => {
    if (m.date !== todayStr || !m.time) return;
    const [h, min] = m.time.split(':').map(Number);
    const diff = (h * 60 + min) - nowMinutes;
    if (diff > 15 || diff < -5) return;
    stillPending.add(m.id);
    if (!seen.has(m.id)) sendNotification('Meeting soon', `${m.title}${m.time ? ' · ' + m.time : ''}`, 'meeting-' + m.id);
  });
  localStorage.setItem(NOTIF_SEEN_MEETING_KEY, JSON.stringify([...stillPending]));
}

function renderLockScreen(mode, opts) {
  opts = opts || {};
  const overlay = document.getElementById('lock-overlay');
  if (!overlay) return;
  overlay.style.display = 'flex';

  let title, sub, showForgot = false;
  if (mode === 'create') {
    title = 'Create a passcode';
    sub = 'Set a 4-digit code to open this dashboard on this device.';
  } else if (mode === 'confirm') {
    title = 'Confirm passcode';
    sub = 'Enter the same 4 digits again.';
  } else {
    title = 'Enter passcode';
    sub = 'This dashboard is locked on this device.';
    showForgot = true;
  }

  overlay.innerHTML = `
    <div class="lock-card">
      <div class="lock-title">🔒 ${title}</div>
      <div class="lock-sub">${sub}</div>
      <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" class="lock-input" id="lock-input"
        onkeydown="if(event.key==='Enter') submitLockInput('${mode}')">
      ${opts.error ? `<div class="lock-error">${escHtml(opts.error)}</div>` : ''}
      <button class="btn btn-primary" style="width:100%;margin-top:10px" onclick="submitLockInput('${mode}')">
        ${mode === 'enter' ? 'Unlock' : 'Continue'}
      </button>
      ${showForgot ? `<button class="lock-forgot" onclick="forgotLockCode()">Forgot passcode?</button>` : ''}
    </div>`;
  setTimeout(() => { const inp = document.getElementById('lock-input'); if (inp) inp.focus(); }, 50);
}

function submitLockInput(mode) {
  const inp = document.getElementById('lock-input');
  const val = inp ? inp.value.trim() : '';
  if (!/^\d{4}$/.test(val)) {
    renderLockScreen(mode, { error: 'Enter exactly 4 digits.' });
    return;
  }
  if (mode === 'create') {
    pendingLockCode = val;
    renderLockScreen('confirm');
    return;
  }
  if (mode === 'confirm') {
    if (val !== pendingLockCode) {
      pendingLockCode = '';
      renderLockScreen('create', { error: "Codes didn't match — start over." });
      return;
    }
    localStorage.setItem(LOCK_KEY, val);
    pendingLockCode = '';
    sessionStorage.setItem(UNLOCK_FLAG, '1');
    hideLockOverlay();
    updateLockStatusUI();
    return;
  }
  // mode === 'enter'
  if (val === localStorage.getItem(LOCK_KEY)) {
    sessionStorage.setItem(UNLOCK_FLAG, '1');
    hideLockOverlay();
  } else {
    renderLockScreen('enter', { error: 'Incorrect passcode.' });
  }
}

function forgotLockCode() {
  showConfirmModal("Reset the passcode? You'll set a new 4-digit code next — your dashboard data is not affected.", () => {
    localStorage.removeItem(LOCK_KEY);
    sessionStorage.removeItem(UNLOCK_FLAG);
    renderLockScreen('create');
  }, { confirmLabel: 'Reset' });
}

function changeLockCode() {
  showPromptModal('Change passcode', 'Enter your current 4-digit passcode:', (current) => {
    if (current !== localStorage.getItem(LOCK_KEY)) { showAlertModal('Incorrect passcode.'); return; }
    localStorage.removeItem(LOCK_KEY);
    renderLockScreen('create');
  }, { inputType: 'password', maxlength: 4, submitLabel: 'Continue' });
}

function disableLockCode() {
  showPromptModal('Turn off passcode lock', 'Enter your current 4-digit passcode to turn off the lock:', (current) => {
    if (current !== localStorage.getItem(LOCK_KEY)) { showAlertModal('Incorrect passcode.'); return; }
    localStorage.removeItem(LOCK_KEY);
    sessionStorage.removeItem(UNLOCK_FLAG);
    updateLockStatusUI();
  }, { inputType: 'password', maxlength: 4, submitLabel: 'Turn off' });
}

function enableLockCode() {
  renderLockScreen('create');
}

function updateLockStatusUI() {
  const row = document.getElementById('lock-status-row');
  if (!row) return;
  const on = !!localStorage.getItem(LOCK_KEY);
  row.innerHTML = on
    ? `<div style="display:flex;flex-direction:column;gap:6px;width:100%">
         <span style="font-size:11px;color:var(--muted)">🔒 Lock: on</span>
         <span style="display:flex;gap:4px">
           <button class="btn" style="flex:1;font-size:11px;padding:4px 8px" onclick="changeLockCode()">Change</button>
           <button class="btn" style="flex:1;font-size:11px;padding:4px 8px" onclick="disableLockCode()">Turn off</button>
         </span>
         <button class="btn" style="width:100%;font-size:11px;padding:4px 8px" onclick="logOutLock()">🔒 Log out</button>
       </div>`
    : `<span style="font-size:11px;color:var(--muted)">🔓 Lock: off</span>
       <button class="btn" style="font-size:11px;padding:4px 8px" onclick="enableLockCode()">Turn on</button>`;
}

function logOutLock() {
  sessionStorage.removeItem(UNLOCK_FLAG);
  renderLockScreen('enter');
}

// ── DATE ───────────────────────────────────────────────────────────────────────

function setDate() {
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('topbar-date').textContent =
    days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
}

// ── INIT ───────────────────────────────────────────────────────────────────────

setDate();
renderAll();
updateLockStatusUI();
updateNotifStatusUI();
initLock();
if (dashboardPin) connectSync(dashboardPin, true);
document.addEventListener('selectionchange', () => { if (activeView === 'notes') updateNotesToolbarState(); });
maybeSendDailyDigest();
checkOverdueNudges();
checkMeetingReminders();

// Keep "today" current if the dashboard is left open across midnight (or
// just idle) — otherwise a task due "today" wouldn't flip to Overdue, and
// the top KPI strip, without some other action triggering a re-render.
// Same interval also re-checks desktop-notification triggers (daily digest,
// newly-overdue nudges, meeting reminders) since all three depend on "today"
// (and meetings also "now") being current.
setInterval(() => {
  setDate(); computeKpis(); renderNav();
  maybeSendDailyDigest();
  checkOverdueNudges();
  checkMeetingReminders();
}, 5 * 60 * 1000);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
